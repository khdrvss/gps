    function buildVehicleIdentityIndex() {
      const byId = new Map();
      const byGuid = new Map();
      const byNumber = new Map();
      const indexConflicts = [];

      for (const v of app.vehicles) {
        const id = normalizeKey(v.vehicleId);
        if (!id) continue;
        byId.set(id, id);

        const guid = normalizeKey(v.vehicleGuid);
        if (guid) {
          if (byGuid.has(guid) && byGuid.get(guid) !== id) {
            indexConflicts.push(`guid=${guid} -> ${byGuid.get(guid)} vs ${id}`);
          } else {
            byGuid.set(guid, id);
          }
        }

        const aliases = [normalizeKey(v.vehicleNumber), normalizeKey(v.name)].filter(Boolean);
        for (const alias of aliases) {
          if (byNumber.has(alias) && byNumber.get(alias) !== id) {
            indexConflicts.push(`number=${alias} -> ${byNumber.get(alias)} vs ${id}`);
          } else {
            byNumber.set(alias, id);
          }
        }
      }

      return { byId, byGuid, byNumber, indexConflicts };
    }

    function resolveVehicleIdentity(row, identityIndex, conflictLog) {
      const rowKey = extractRowVehicleKey(row);
      const rowGuid = extractRowVehicleGuid(row);
      const rowNumber = extractRowVehicleNumber(row);

      const candidates = [];
      if (rowKey) candidates.push({ id: identityIndex.byId.get(rowKey) || rowKey, source: 'vehicleId' });
      if (rowGuid) candidates.push({ id: identityIndex.byGuid.get(rowGuid) || rowGuid, source: 'vehicleGuid' });
      if (rowNumber) candidates.push({ id: identityIndex.byNumber.get(rowNumber) || rowNumber, source: 'vehicleNumber' });

      const normalizedCandidates = candidates
        .map(c => ({ ...c, id: normalizeKey(c.id) }))
        .filter(c => c.id);
      const uniqueIds = [...new Set(normalizedCandidates.map(c => c.id))];
      const resolved = normalizedCandidates[0]?.id || null;

      if (uniqueIds.length > 1 && conflictLog.length < 12) {
        conflictLog.push(`id=${rowKey || '-'}, guid=${rowGuid || '-'}, number=${rowNumber || '-'} => ${uniqueIds.join(' | ')} (selected=${resolved})`);
        return { id: null, rowKey, rowGuid, rowNumber, conflict: true };
      }

      return { id: resolved, rowKey, rowGuid, rowNumber, conflict: false };
    }

    function normalizeKey(v) {
      if (v === null || v === undefined) return null;
      const s = String(v).trim();
      return s.length ? s : null;
    }

    function toFiniteNumber(v) {
      if (Number.isFinite(v)) return v;
      if (v === null || v === undefined) return NaN;
      if (typeof v === 'string') {
        const normalized = v.trim().replace(/\s+/g, '').replace(',', '.');
        const n = Number(normalized);
        return Number.isFinite(n) ? n : NaN;
      }
      const n = Number(v);
      return Number.isFinite(n) ? n : NaN;
    }

    function toCoordinateNumber(v, isLat = true) {
      const n = toFiniteNumber(v);
      if (!Number.isFinite(n)) return NaN;

      const limit = isLat ? 90 : 180;
      if (Math.abs(n) <= limit) return n;

      // Common GPS encodings: micro/decimal scaling
      const scales = [1e7, 1e6, 1e5, 1e4, 1e3];
      for (const s of scales) {
        const scaled = n / s;
        if (Math.abs(scaled) <= limit) return scaled;
      }

      return NaN;
    }

    function toApiVehicleId(v) {
      const s = normalizeKey(v);
      if (!s) return v;
      return /^-?\d+$/.test(s) ? Number(s) : s;
    }

    function pickFromRow(row, keys) {
      for (const k of keys) {
        if (row && row[k] !== undefined && row[k] !== null) return row[k];
      }
      return undefined;
    }

    function extractRowVehicleKey(row) {
      const direct = normalizeKey(pickFromRow(row, ['vehicleId','VehicleId','id','Id','vehicle_id','VehicleID']));
      if (direct) return direct;
      const nested = row?.vehicle || row?.Vehicle || row?.unit || row?.Unit;
      return normalizeKey(pickFromRow(nested || {}, ['id','Id','vehicleId','VehicleId']));
    }

    function extractRowVehicleGuid(row) {
      const direct = normalizeKey(pickFromRow(row, ['vehicleGuid','VehicleGuid','guid','Guid']));
      if (direct) return direct;
      const nested = row?.vehicle || row?.Vehicle;
      return normalizeKey(pickFromRow(nested || {}, ['guid','Guid','vehicleGuid','VehicleGuid']));
    }

    function extractRowVehicleNumber(row) {
      const direct = normalizeKey(pickFromRow(row, ['vehicleNumber','VehicleNumber','name','Name','plate','Plate','gosNomer']));
      if (direct) return direct;
      const nested = row?.vehicle || row?.Vehicle || row?.lastData || row?.LastData;
      return normalizeKey(pickFromRow(nested || {}, ['vehicleNumber','VehicleNumber','name','Name','plate','Plate','gosNomer']));
    }

    function buildCoordDebugSample(row) {
      if (!row || typeof row !== 'object') return '';
      const sample = {
        vehicleId: row.vehicleId ?? row.VehicleId ?? row.id ?? row.Id ?? null,
        vehicleGuid: row.vehicleGuid ?? row.VehicleGuid ?? row.guid ?? row.Guid ?? null,
        vehicleNumber: row.vehicleNumber ?? row.VehicleNumber ?? row.name ?? row.Name ?? null,
        latitude: row.latitude ?? row.Latitude ?? row.lat ?? row.Lat ?? row.y ?? row.Y ?? null,
        longitude: row.longitude ?? row.Longitude ?? row.lng ?? row.Lng ?? row.lon ?? row.Lon ?? row.x ?? row.X ?? null,
        position: row.position ?? row.Position ?? null,
        location: row.location ?? row.Location ?? null,
        coordinates: row.coordinates ?? row.Coordinates ?? row.coords ?? row.Coords ?? null
      };
      return JSON.stringify(sample).slice(0, 320);
    }

    function collectCoordinateDiagnostics(rows, label = 'unknown') {
      const items = Array.isArray(rows) ? rows : [];
      let withCoords = 0;
      let withTime = 0;
      let withState = 0;
      let withPositionLike = 0;
      let withCoordinatesField = 0;
      let withLocationLike = 0;
      let latestTimeMs = NaN;
      let sampleNoCoords = '';
      let sampleWithCoords = '';

      for (const row of items) {
        const { lat, lng } = extractLatLng(row);
        const hasCoord = Number.isFinite(lat) && Number.isFinite(lng);
        if (hasCoord) {
          withCoords++;
          if (!sampleWithCoords) sampleWithCoords = buildCoordDebugSample(row);
        } else if (!sampleNoCoords) {
          sampleNoCoords = buildCoordDebugSample(row);
        }

        const hasPositionLike = row?.position != null || row?.Position != null;
        const hasCoordinatesField = row?.coordinates != null || row?.Coordinates != null || row?.coords != null || row?.Coords != null;
        const hasLocationLike = row?.location != null || row?.Location != null || row?.point != null || row?.Point != null;
        if (hasPositionLike) withPositionLike++;
        if (hasCoordinatesField) withCoordinatesField++;
        if (hasLocationLike) withLocationLike++;

        const dyn = extractSpeedCourseTime(row);
        const tm = parseApiTimeMs(dyn.receiveTime || dyn.recordTime);
        if (Number.isFinite(tm)) {
          withTime++;
          if (!Number.isFinite(latestTimeMs) || tm > latestTimeMs) latestTimeMs = tm;
        }

        const st = extractRowStateCode(row);
        if (st !== null) withState++;
      }

      const total = items.length;
      return {
        label,
        total,
        withCoords,
        withoutCoords: Math.max(total - withCoords, 0),
        withTime,
        withState,
        withPositionLike,
        withCoordinatesField,
        withLocationLike,
        latestTimeIso: Number.isFinite(latestTimeMs) ? new Date(latestTimeMs).toISOString() : null,
        sampleNoCoords,
        sampleWithCoords
      };
    }

    function formatCoordDiagnostics(diag) {
      if (!diag || !diag.total) return '';
      const ageText = diag.latestTimeIso
        ? `latestTime=${diag.latestTimeIso}`
        : 'latestTime=none';
      return `${diag.label}: rows=${diag.total}, coords=${diag.withCoords}, time=${diag.withTime}, state=${diag.withState}, positionField=${diag.withPositionLike}, coordinatesField=${diag.withCoordinatesField}, locationField=${diag.withLocationLike}, ${ageText}`;
    }

    function extractSpeedCourseTime(row) {
      const speed = toFiniteNumber(
        row?.speed ?? row?.Speed ?? row?.state?.speed ?? row?.State?.Speed ??
        row?.lastData?.speed ?? row?.lastData?.Speed ?? row?.LastData?.speed ?? row?.LastData?.Speed ??
        row?.position?.speed ?? row?.position?.Speed ?? row?.Position?.speed ?? row?.Position?.Speed ?? 0
      );
      const course = toFiniteNumber(
        row?.course ?? row?.Course ?? row?.state?.course ?? row?.State?.Course ??
        row?.lastData?.course ?? row?.lastData?.Course ?? row?.LastData?.course ?? row?.LastData?.Course ??
        row?.position?.course ?? row?.position?.Course ?? row?.Position?.course ?? row?.Position?.Course ?? 0
      );
      const receiveTime =
        row?.receiveTime ?? row?.ReceiveTime ?? row?.gpsTime ?? row?.GpsTime ??
        row?.positionTime ?? row?.PositionTime ?? row?.lastDataTime ?? row?.LastDataTime ??
        row?.lastData?.receiveTime ?? row?.lastData?.ReceiveTime ?? row?.LastData?.receiveTime ?? row?.LastData?.ReceiveTime ??
        row?.recordTime ?? row?.RecordTime;
      const recordTime =
        row?.recordTime ?? row?.RecordTime ?? row?.gpsTime ?? row?.GpsTime ??
        row?.positionTime ?? row?.PositionTime ?? row?.lastDataTime ?? row?.LastDataTime ??
        row?.lastData?.recordTime ?? row?.lastData?.RecordTime ?? row?.LastData?.recordTime ?? row?.LastData?.RecordTime ??
        row?.receiveTime ?? row?.ReceiveTime;

      return { speed: Number.isFinite(speed) ? speed : 0, course: Number.isFinite(course) ? course : 0, receiveTime, recordTime };
    }

    function extractStateCode(value) {
      if (Number.isFinite(Number(value))) return Number(value);
      if (!value || typeof value !== 'object') return null;
      const candidates = [value.state, value.State, value.code, value.Code, value.value, value.Value, value.id, value.Id];
      for (const c of candidates) {
        if (Number.isFinite(Number(c))) return Number(c);
      }
      return null;
    }

    function extractRowStateCode(row) {
      const variants = [
        row?.state,
        row?.State,
        row?.lastState,
        row?.LastState,
        row?.lastData?.state,
        row?.lastData?.State,
        row?.LastData?.state,
        row?.LastData?.State,
        row?.position?.state,
        row?.Position?.state
      ];
      for (const v of variants) {
        const code = extractStateCode(v);
        if (code !== null) return code;
      }
      return null;
    }

    function extractLatLng(row) {
      const latCandidates = [
        row?.latitude, row?.Latitude, row?.lat, row?.Lat,
        row?.y, row?.Y, row?.positionY, row?.PositionY,
        row?.lastData?.latitude, row?.lastData?.Latitude, row?.lastData?.lat, row?.lastData?.Lat,
        row?.lastData?.y, row?.lastData?.Y, row?.lastData?.positionY, row?.lastData?.PositionY,
        row?.LastData?.latitude, row?.LastData?.Latitude, row?.LastData?.lat, row?.LastData?.Lat,
        row?.LastData?.y, row?.LastData?.Y, row?.LastData?.positionY, row?.LastData?.PositionY,
        row?.position?.latitude, row?.position?.Latitude, row?.position?.lat, row?.position?.Lat,
        row?.location?.latitude, row?.location?.Latitude, row?.location?.lat, row?.location?.Lat,
        row?.point?.latitude, row?.point?.Latitude, row?.point?.lat, row?.point?.Lat,
        row?.coords?.latitude, row?.coords?.Latitude, row?.coords?.lat, row?.coords?.Lat
      ];
      const lngCandidates = [
        row?.longitude, row?.Longitude, row?.lng, row?.Lng, row?.lon, row?.Lon,
        row?.x, row?.X, row?.positionX, row?.PositionX,
        row?.lastData?.longitude, row?.lastData?.Longitude, row?.lastData?.lng, row?.lastData?.Lng, row?.lastData?.lon, row?.lastData?.Lon,
        row?.lastData?.x, row?.lastData?.X, row?.lastData?.positionX, row?.lastData?.PositionX,
        row?.LastData?.longitude, row?.LastData?.Longitude, row?.LastData?.lng, row?.LastData?.Lng, row?.LastData?.lon, row?.LastData?.Lon,
        row?.LastData?.x, row?.LastData?.X, row?.LastData?.positionX, row?.LastData?.PositionX,
        row?.position?.longitude, row?.position?.Longitude, row?.position?.lng, row?.position?.Lng, row?.position?.lon, row?.position?.Lon,
        row?.location?.longitude, row?.location?.Longitude, row?.location?.lng, row?.location?.Lng, row?.location?.lon, row?.location?.Lon,
        row?.point?.longitude, row?.point?.Longitude, row?.point?.lng, row?.point?.Lng, row?.point?.lon, row?.point?.Lon,
        row?.coords?.longitude, row?.coords?.Longitude, row?.coords?.lng, row?.coords?.Lng, row?.coords?.lon, row?.coords?.Lon
      ];

      let lat = NaN;
      let lng = NaN;
      for (const c of latCandidates) {
        const n = toCoordinateNumber(c, true);
        if (Number.isFinite(n)) { lat = n; break; }
      }
      for (const c of lngCandidates) {
        const n = toCoordinateNumber(c, false);
        if (Number.isFinite(n)) { lng = n; break; }
      }

      if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
        const custom = extractLatLngFromCustomFields(row);
        if (custom) {
          lat = Number.isFinite(lat) ? lat : custom.lat;
          lng = Number.isFinite(lng) ? lng : custom.lng;
        }
      }

      if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
        const pair = extractCoordinatePair(row);
        if (pair) {
          lat = Number.isFinite(lat) ? lat : pair.lat;
          lng = Number.isFinite(lng) ? lng : pair.lng;
        }
      }

      if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
        const deep = findLatLngDeep(row, 0, 4);
        if (deep) {
          lat = Number.isFinite(lat) ? lat : deep.lat;
          lng = Number.isFinite(lng) ? lng : deep.lng;
        }
      }
      return { lat, lng };
    }

    function findLatLngDeep(node, depth = 0, maxDepth = 4) {
      if (!node || typeof node !== 'object' || depth > maxDepth) return null;

      const lat = toCoordinateNumber(node.latitude ?? node.Latitude ?? node.lat ?? node.Lat ?? node.y ?? node.Y, true);
      const lng = toCoordinateNumber(node.longitude ?? node.Longitude ?? node.lng ?? node.Lng ?? node.lon ?? node.Lon ?? node.x ?? node.X, false);
      if (Number.isFinite(lat) && Number.isFinite(lng) && Math.abs(lat) <= 90 && Math.abs(lng) <= 180) {
        return { lat, lng };
      }

      const pairFromNode = parseCoordinateLike(node.coordinates ?? node.Coordinates ?? node.coords ?? node.Coords ?? node.point ?? node.Point);
      if (pairFromNode) return pairFromNode;

      for (const val of Object.values(node)) {
        if (val && typeof val === 'object') {
          const found = findLatLngDeep(val, depth + 1, maxDepth);
          if (found) return found;
        }
      }
      return null;
    }

    function extractLatLngFromCustomFields(row) {
      const buckets = [
        row?.customFields, row?.CustomFields,
        row?.vehicle?.customFields, row?.vehicle?.CustomFields,
        row?.lastData?.customFields, row?.lastData?.CustomFields,
        row?.LastData?.customFields, row?.LastData?.CustomFields
      ].filter(Boolean);

      for (const bucket of buckets) {
        const items = Array.isArray(bucket)
          ? bucket
          : (typeof bucket === 'object' ? Object.values(bucket) : []);

        let lat = NaN;
        let lng = NaN;
        for (const item of items) {
          const key = String(item?.name ?? item?.Name ?? item?.key ?? item?.Key ?? '').toLowerCase();
          const value = item?.value ?? item?.Value ?? item?.val ?? item?.Val;
          if (!key) continue;

          if (!Number.isFinite(lat) && /(lat|latitude|широта|enlem)/i.test(key)) {
            lat = toCoordinateNumber(value, true);
          }
          if (!Number.isFinite(lng) && /(lon|lng|long|longitude|долгота|boylam)/i.test(key)) {
            lng = toCoordinateNumber(value, false);
          }
        }

        if (Number.isFinite(lat) && Number.isFinite(lng)) return { lat, lng };
      }

      return null;
    }

    function extractCoordinatePair(row) {
      const candidates = [
        row?.coordinates, row?.Coordinates, row?.coords, row?.Coords,
        row?.lastData?.coordinates, row?.lastData?.Coordinates, row?.lastData?.coords, row?.lastData?.Coords,
        row?.LastData?.coordinates, row?.LastData?.Coordinates, row?.LastData?.coords, row?.LastData?.Coords,
        row?.position?.coordinates, row?.position?.Coordinates,
        row?.location?.coordinates, row?.location?.Coordinates,
        row?.point, row?.Point
      ];

      for (const c of candidates) {
        const pair = parseCoordinateLike(c);
        if (pair) return pair;
      }
      return null;
    }

    function parseCoordinateLike(value) {
      if (!value) return null;

      if (Array.isArray(value) && value.length >= 2) {
        const a = toFiniteNumber(value[0]);
        const b = toFiniteNumber(value[1]);
        if (Number.isFinite(a) && Number.isFinite(b)) {
          // Common geojson order: [lng, lat]
          if (Math.abs(a) <= 180 && Math.abs(b) <= 90) return { lng: a, lat: b };
          if (Math.abs(a) <= 90 && Math.abs(b) <= 180) return { lat: a, lng: b };
        }
      }

      if (typeof value === 'string') {
        const nums = value.match(/-?\d+(?:[\.,]\d+)?/g);
        if (nums && nums.length >= 2) {
          const a = toFiniteNumber(nums[0]);
          const b = toFiniteNumber(nums[1]);
          if (Number.isFinite(a) && Number.isFinite(b)) {
            if (Math.abs(a) <= 180 && Math.abs(b) <= 90) return { lng: a, lat: b };
            if (Math.abs(a) <= 90 && Math.abs(b) <= 180) return { lat: a, lng: b };
          }
        }
      }

      return null;
    }

    function rowHasCoordinates(row) {
      const c = extractLatLng(row);
      return Number.isFinite(c.lat) && Number.isFinite(c.lng);
    }

    function rangeTodayInTimezone(offsetHours = 4) {
      const nowMs = Date.now();
      const offsetMs = Number(offsetHours || 0) * 60 * 60 * 1000;
      const shiftedMs = nowMs + offsetMs;
      const startOfDayShiftedMs = Math.floor(shiftedMs / 86400000) * 86400000;
      const fromMs = startOfDayShiftedMs - offsetMs;
      return { from: new Date(fromMs).toISOString(), to: new Date(nowMs).toISOString() };
    }

    function renderPanelContent(html) {
      document.getElementById('panelContent').innerHTML = html;
    }

    function pickStopAddress(stop) {
      const candidates = [
        stop?.address,
        stop?.Address,
        stop?.startAddress,
        stop?.StartAddress,
        stop?.endAddress,
        stop?.EndAddress,
        stop?.fromAddress,
        stop?.FromAddress,
        stop?.toAddress,
        stop?.ToAddress,
        stop?.location,
        stop?.Location,
        stop?.place,
        stop?.Place
      ];
      for (const c of candidates) {
        const s = normalizeKey(c);
        if (s) return s;
      }
      return 'Noma’lum';
    }

    async function loadStopsPanel(vehicleId) {
      if (app.reportLoading.stops) return;
      if (!vehicleId) {
        app.lastStopsData = [];
        updateTabCounts();
        renderPanelEmpty('To‘xtashlar topilmadi', 'To‘xtashlarni yuklash uchun transportni tanlang.');
        return;
      }
      setReportLoading('stops', true);
      const { from, to } = rangeTodayInTimezone(4);
      renderPanelLoading('To‘xtashlar yuklanmoqda...');
      try {
        const out = await app.api.getMoveStop({ vehicleIds: [toApiVehicleId(vehicleId)], from, to, timezone: 4 });
        const row = arr(out)[0] || {};
        const stopsRaw = Array.isArray(row.stops)
          ? row.stops
          : (Array.isArray(row.stopping) ? row.stopping : (Array.isArray(row.Stops) ? row.Stops : []));
        const rangeStartMs = Date.parse(from);
        const rangeEndMs = Date.parse(to);
        const stops = stopsRaw.map(s => ({
          ...s,
          _address: pickStopAddress(s),
          _minutes: getStopDurationMinutes(s, rangeStartMs, rangeEndMs)
        }));
        const moves = Array.isArray(row.moves) ? row.moves : [];
        const displayedStops = stops.slice().sort((a, b) => {
          const aTime = parseApiTimeMs(a.end || a.End || a.start || a.Start);
          const bTime = parseApiTimeMs(b.end || b.End || b.start || b.Start);
          return (Number.isFinite(bTime) ? bTime : 0) - (Number.isFinite(aTime) ? aTime : 0);
        });
        app.lastStopsData = stops;
        updateTabCounts();
        const uniqueAddresses = new Set(stops.map(s => s._address).filter(Boolean));
        const repeatedAddressHint = stops.length > 1 && uniqueAddresses.size === 1
          ? `<br><span style="color:#ffcf80;">Diqqat: API to‘xtashlar uchun bir xil manzil qaytardi (${escapeHtml([...uniqueAddresses][0] || 'Noma’lum')}).</span>`
          : '';

        renderPanelContent(`
          <div style="margin-bottom:8px;" class="muted"><strong style="color:#fff">Bugun:</strong> Harakatlar ${moves.length}, To‘xtashlar ${stops.length}, noyob manzillar ${uniqueAddresses.size}${repeatedAddressHint}</div>
          ${stops.length ? `
            <table class="table">
              <thead><tr><th>Boshlanish</th><th>Tugash</th><th>Davomiyligi</th><th>Manzil</th></tr></thead>
              <tbody>
                ${displayedStops.slice(0, 200).map(s => `<tr>
                  <td>${escapeHtml(formatDate(s.start))}</td>
                  <td>${escapeHtml(formatDate(s.end))}</td>
                  <td>${escapeHtml(formatMinutesHuman(s._minutes))}</td>
                  <td>${escapeHtml(s._address || 'Noma’lum')}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          ` : '<span class="muted">Tanlangan oraliqda to‘xtashlar topilmadi.</span>'}
        `);
      } catch (e) {
        app.lastStopsData = [];
        updateTabCounts();
        renderPanelError('To‘xtashlar', e, () => loadStopsPanel(vehicleId));
      } finally {
        setReportLoading('stops', false);
      }
    }

    function wireFuelRangeButtons(vehicleId) {
      document.querySelectorAll('[data-fuel-range]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (isAnyReportLoading()) return;
          const days = Number(btn.dataset.fuelRange);
          if (!Number.isFinite(days) || days <= 0) return;
          if (days === Number(app.fuelRangeDays || 1)) return;
          await loadFuelPanel(vehicleId, days);
        });
      });
    }

    async function loadFuelPanel(vehicleId, rangeDays = app.fuelRangeDays) {
      if (app.reportLoading.fuel) return;
      if (!vehicleId) {
        app.lastFuelEvents = [];
        updateTabCounts();
        renderPanelEmpty('Yoqilg‘i bo‘limi bo‘sh', 'Yoqilg‘i ma’lumotlarini yuklash uchun transportni tanlang.');
        return;
      }

      setReportLoading('fuel', true);
      const to = new Date();
      const allowedRanges = new Set([1, 3, 7, 14, 30]);
      const selectedRange = allowedRanges.has(Number(rangeDays)) ? Number(rangeDays) : 1;
      app.fuelRangeDays = selectedRange;
      const from = new Date(to);
      from.setDate(from.getDate() - selectedRange);
      renderPanelLoading('Yoqilg‘i ma’lumotlari yuklanmoqda...');

      try {
        const [consOut, inOut] = await Promise.all([
          app.api.getFuelConsumption({
            sampling: 3600,
            vehicleIds: [toApiVehicleId(vehicleId)],
            from: from.toISOString(),
            to: to.toISOString(),
            timezone: 4
          }),
          app.api.getFuelInOut({
            vehicleIds: [toApiVehicleId(vehicleId)],
            from: from.toISOString(),
            to: to.toISOString(),
            timezone: 4
          })
        ]);

        const cRow = arr(consOut)[0] || {};
        const periods = Array.isArray(cRow.periods) ? cRow.periods : [];
        const totalConsumption = periods.reduce((acc, p) => acc + Number(p.fuelConsumption || 0), 0);
        const totalMoveConsumption = periods.reduce((acc, p) => acc + Number(p.fuelConsumptionMove || 0), 0);

        const ioRow = arr(inOut)[0] || {};
        const events = Array.isArray(ioRow.fuels) ? ioRow.fuels : [];
        app.lastFuelEvents = events;
        updateTabCounts();

        const refillCount = events.filter(e => Number(e.event) === 0).length;
        const drainCount = events.filter(e => Number(e.event) === 1).length;
        const drainVolume = events
          .filter(e => Number(e.event) === 1)
          .reduce((acc, e) => acc + Number(e.valueFuel || 0), 0);

        const rangeButtons = [1, 3, 7, 14, 30].map(days => `
          <button class="range-chip ${days === selectedRange ? 'active' : ''}" data-fuel-range="${days}">${days} kun</button>
        `).join('');

        renderPanelContent(`
          <div class="range-chip-group" aria-label="Yoqilg‘i davri tanlash">
            ${rangeButtons}
          </div>
          <div class="muted" style="margin-bottom:8px;">
            <strong style="color:#fff">So‘nggi ${selectedRange} kun yoqilg‘i hisoboti</strong><br>
            Davrlar: ${periods.length} · Umumiy sarf: ${totalConsumption.toFixed(2)} L · Harakatdagi sarf: ${totalMoveConsumption.toFixed(2)} L
          </div>
          <div class="muted" style="margin-bottom:8px;">
            Quyishlar: ${refillCount} · Oqib ketishlar: ${drainCount} · Oqib ketgan hajm: ${drainVolume.toFixed(2)} L
            ${drainVolume > 20 ? '<br><span style="color:#ff9a9a;">Ogohlantirish: katta yoqilg‘i kamayishi aniqlandi.</span>' : ''}
          </div>
          ${events.length ? `
            <table class="table">
              <thead><tr><th>Turi</th><th>Boshlanish</th><th>Tugash</th><th>Yoqilg‘i Δ</th><th>Bosh/Tug</th></tr></thead>
              <tbody>
                ${events.slice(0, 200).map(e => `<tr>
                  <td>${Number(e.event) === 0 ? 'Quyish' : 'Oqib ketish'}</td>
                  <td>${escapeHtml(formatDate(e.startDate))}</td>
                  <td>${escapeHtml(formatDate(e.endDate))}</td>
                  <td>${Number(e.valueFuel || 0).toFixed(2)} L</td>
                  <td>${Number(e.fuelStart || 0).toFixed(1)} → ${Number(e.fuelEnd || 0).toFixed(1)}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          ` : '<span class="muted">Tanlangan oraliqda yoqilg‘i hodisalari topilmadi.</span>'}
        `);
        wireFuelRangeButtons(vehicleId);
      } catch (e) {
        app.lastFuelEvents = [];
        updateTabCounts();
        renderPanelError('Yoqilg‘i', e, () => loadFuelPanel(vehicleId));
      } finally {
        setReportLoading('fuel', false);
      }
    }

    function wireMileageRangeButtons(vehicleId) {
      document.querySelectorAll('[data-mileage-range]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (isAnyReportLoading()) return;
          const days = Number(btn.dataset.mileageRange);
          if (!Number.isFinite(days) || days <= 0) return;
          if (days === Number(app.mileageRangeDays || 3)) return;
          await loadMileagePanel(vehicleId, days);
        });
      });
    }

    async function loadMileagePanel(vehicleId, rangeDays = app.mileageRangeDays) {
      if (app.reportLoading.mileage) return;
      if (!vehicleId) {
        app.lastMileagePeriods = [];
        updateTabCounts();
        renderPanelEmpty('Yurgan masofa bo‘limi bo‘sh', 'Yurgan masofa ma’lumotlarini yuklash uchun transportni tanlang.');
        return;
      }

      setReportLoading('mileage', true);
      const to = new Date();
      const allowedRanges = new Set([3, 7, 14, 30]);
      const selectedRange = allowedRanges.has(Number(rangeDays)) ? Number(rangeDays) : 3;
      app.mileageRangeDays = selectedRange;
      renderPanelLoading('Yurgan masofa ma’lumotlari yuklanmoqda...');

      try {
        const from = new Date(to);
        from.setDate(from.getDate() - selectedRange);
        const out = await app.api.getMileageAndMotohours({
          sampling: 86400,
          vehicleIds: [toApiVehicleId(vehicleId)],
          from: from.toISOString(),
          to: to.toISOString(),
          timezone: 4
        }, {
          timeoutMs: CONFIG.LONG_REPORT_TIMEOUT_MS,
          maxAttempts: 2
        });

        const row = arr(out)[0] || {};
        const periods = Array.isArray(row.periods) ? row.periods : [];
        app.lastMileagePeriods = periods;
        updateTabCounts();

        const totalMileage = periods.reduce((acc, p) => acc + Number(p.mileage || 0), 0);
        const totalMotohours = periods.reduce((acc, p) => acc + Number(p.motohours || 0), 0);

        const rangeButtons = [3, 7, 14, 30].map(days => `
          <button class="range-chip ${days === selectedRange ? 'active' : ''}" data-mileage-range="${days}">${days} kun</button>
        `).join('');

        renderPanelContent(`
          <div class="range-chip-group" aria-label="Yurgan masofa davri tanlash">
            ${rangeButtons}
          </div>
          <div class="muted" style="margin-bottom:8px;">
            <strong style="color:#fff">So‘nggi ${selectedRange} kun yurgan masofa hisoboti</strong><br>
            Kunlar: ${periods.length} · Umumiy masofa: ${totalMileage.toFixed(1)} km · Umumiy motosoat: ${totalMotohours.toFixed(1)} soat
          </div>
          ${periods.length ? `
            <table class="table">
              <thead><tr><th>Sana</th><th>Masofa</th><th>Motosoat</th><th>Odometriya</th></tr></thead>
              <tbody>
                ${periods.slice(0, 200).map(p => `<tr>
                  <td>${escapeHtml(formatDate(p.start))}</td>
                  <td>${Number(p.mileage || 0).toFixed(1)} km</td>
                  <td>${Number(p.motohours || 0).toFixed(1)} soat</td>
                  <td>${Number(p.mileageBegin || 0).toFixed(1)} → ${Number(p.mileageEnd || 0).toFixed(1)}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          ` : '<span class="muted">Tanlangan oraliqda yurgan masofa ma’lumotlari topilmadi.</span>'}
        `);
        wireMileageRangeButtons(vehicleId);
      } catch (e) {
        app.lastMileagePeriods = [];
        updateTabCounts();
        renderPanelError('Yurgan masofa', e, () => loadMileagePanel(vehicleId));
      } finally {
        setReportLoading('mileage', false);
      }
    }

    function wireTabs() {
      document.querySelectorAll('.tab[data-tab]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (isAnyReportLoading()) return;
          setActiveTab(btn.dataset.tab);

          if (app.activeTab === 'stops') {
            await loadStopsPanel(app.selectedId);
          } else if (app.activeTab === 'fuel') {
            await loadFuelPanel(app.selectedId);
          } else if (app.activeTab === 'mileage') {
            await loadMileagePanel(app.selectedId);
          } else if (app.activeTab === 'routes') {
            await loadRoutesPanel(app.selectedId);
          } else {
            renderPanelContent(`<span class="muted">${escapeHtml(tabUz(app.activeTab))} bo‘limi keyingi bosqichda qo‘shiladi.</span>`);
          }
        });
      });

      document.getElementById('exportCsvBtn').addEventListener('click', () => {
        if (isAnyReportLoading()) return;
        try {
          let header = [];
          let rows = [];

          if (app.activeTab === 'stops' && app.lastStopsData.length) {
            header = ['start','end','duration_minutes','address'];
            rows = app.lastStopsData.map(s => [
              formatDate(s.start),
              formatDate(s.end),
              Number(s._minutes || 0).toFixed(1),
              (s._address || s.address || '').replaceAll('"', '""')
            ]);
          } else if (app.activeTab === 'fuel' && app.lastFuelEvents.length) {
            header = ['type','start','end','fuel_delta_liters','fuel_start','fuel_end'];
            rows = app.lastFuelEvents.map(e => [
              Number(e.event) === 0 ? 'Quyish' : 'Oqib ketish',
              formatDate(e.startDate),
              formatDate(e.endDate),
              Number(e.valueFuel || 0).toFixed(2),
              Number(e.fuelStart || 0).toFixed(1),
              Number(e.fuelEnd || 0).toFixed(1)
            ]);
          } else if (app.activeTab === 'mileage' && app.lastMileagePeriods.length) {
            header = ['sana','masofa_km','motosoat','odometriya_boshlanish','odometriya_tugash'];
            rows = app.lastMileagePeriods.map(p => [
              formatDate(p.start),
              Number(p.mileage || 0).toFixed(1),
              Number(p.motohours || 0).toFixed(1),
              Number(p.mileageBegin || 0).toFixed(1),
              Number(p.mileageEnd || 0).toFixed(1)
            ]);
          } else if (app.activeTab === 'routes' && app.lastRoutesData.length) {
            header = ['start','end','duration_minutes','mileage_km'];
            rows = app.lastRoutesData.map(m => [
              formatDate(m.start || m.Start),
              formatDate(m.end || m.End),
              (Number(m.duration || m.Duration || 0) / 60).toFixed(1),
              Number(m.mileage || m.Mileage || 0).toFixed(1)
            ]);
          } else {
            banner('Joriy bo‘lim uchun eksport qilinadigan ma’lumot yo‘q.');
            return;
          }

          const csv = buildCsvContent(header, rows);
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
          triggerFileDownload(csvFileNameByTab(app.activeTab), blob);
          banner('CSV fayl yuklab olindi.', 2200);
        } catch (err) {
          console.error('CSV export failed', err);
          showToast('CSV eksportida xatolik yuz berdi.', { type: 'error', timeout: 4200 });
        }
      });
    }

    function renderMarkers() {
      const seen = new Set();
      const coords = [];
      for (const d of Object.values(app.lastById)) {
        if (!Number.isFinite(d.latitude) || !Number.isFinite(d.longitude)) continue;
        seen.add(d.vehicleId);
        coords.push([d.latitude, d.longitude]);

        const st = statusOf(d);
        let marker = app.markers.get(d.vehicleId);
        if (!marker) {
          marker = L.marker([d.latitude, d.longitude], {
            pane: 'vehiclesPane',
            icon: markerIconByStatus(st.key),
            keyboard: false
          }).addTo(app.map);
          marker._statusKey = st.key;
          marker._lastRenderMs = Date.now();
          marker._lastFixTimeMs = parseApiTimeMs(d.receiveTime || d.recordTime || d.gpsTime || d.positionTime || d.lastDataTime);
          marker.on('click', () => selectVehicle(d.vehicleId));
          app.markers.set(d.vehicleId, marker);
          marker.bindTooltip(`${d.speed ? Number(d.speed).toFixed(0) : 0} km/soat`, { direction: 'top', offset: [0, -6], opacity: 0.9 });
          updateMarkerVisuals(marker, d);
        } else {
          const smoothDuration = computeMarkerAnimationDuration(marker, d);
          animateMarkerTo(marker, d.latitude, d.longitude, smoothDuration);
          if (marker._statusKey !== st.key) {
            marker.setIcon(markerIconByStatus(st.key));
            marker._statusKey = st.key;
          }
          marker._statusKey = st.key;
          if (typeof marker.setTooltipContent === 'function') {
            marker.setTooltipContent(`${d.speed ? Number(d.speed).toFixed(0) : 0} km/soat`);
          }
          updateMarkerVisuals(marker, d);
        }

        if (app.followSelected && app.selectedId === d.vehicleId) {
          app.map.panTo([d.latitude, d.longitude], { animate: true, duration: 0.6 });
        }
      }

      for (const [id, marker] of app.markers.entries()) {
        if (!seen.has(id)) {
          app.map.removeLayer(marker);
          app.markers.delete(id);
        }
      }

      if (!app.hasAutoFittedMap) {
        if (coords.length > 1) {
          app.map.fitBounds(coords, { padding: [30, 30] });
          app.hasAutoFittedMap = true;
        } else if (coords.length === 1) {
          app.map.setView(coords[0], 14);
          app.hasAutoFittedMap = true;
        }
      }

      if (!app.markerDebugNotified && coords.length > 0) {
        app.markerDebugNotified = true;
        banner(`${coords.length} ta marker xaritaga chizildi.`);
      }

      updateMarkerSelectionStyles();
      syncMarkerClusterState();

      if (app.selectedId !== null && app.selectedId !== undefined) updateSelectedTrail(app.selectedId);

      // Map size invalidation is handled on login/resize/visibility events.
    }

    function selectVehicle(id) {
      if (app.selectedId !== id) {
        clearSelectedTrail();
      }
      app.selectedId = id;
      renderDetails(id);
      renderList();
      if (app.activeTab === 'stops') loadStopsPanel(id);
      if (app.activeTab === 'fuel') loadFuelPanel(id);
      if (app.activeTab === 'mileage') loadMileagePanel(id);
      if (app.activeTab === 'routes') loadRoutesPanel(id);

      updateMarkerSelectionStyles();

      const d = app.lastById[id];
      if (d && Number.isFinite(d.latitude) && Number.isFinite(d.longitude)) {
        app.map.setView([d.latitude, d.longitude], Math.max(app.map.getZoom(), 14));
        updateSelectedTrail(id);
      }
      syncMarkerClusterState();
    }

    async function refreshLastData() {
      const results = [];
      let vehiclesSnapshotRows = [];
      for (let i = 0; i < app.vehicles.length; i += CONFIG.BATCH_SIZE) {
        const vehicleChunk = app.vehicles.slice(i, i + CONFIG.BATCH_SIZE);
        const idChunk = vehicleChunk.map(v => toApiVehicleId(v.vehicleId));
        const guidChunk = vehicleChunk.map(v => normalizeKey(v.vehicleGuid)).filter(Boolean);
        try {
          let rows = [];
          const batch = await app.api.getLastData(idChunk);
          rows = arr(batch);

          // Fallback payload variants for installations with different request schema.
          if ((!rows.length || !rows.some(rowHasCoordinates)) && (idChunk.length || guidChunk.length)) {
            const numericChunk = idChunk.map(toFiniteNumber).filter(n => Number.isFinite(n));
            const variants = [
              ...(numericChunk.length ? [numericChunk] : []),
              ...(idChunk.length ? [idChunk] : [])
            ];

            for (const payload of variants) {
              try {
                const alt = await app.api.request('/api/v3/vehicles/getlastdata', 'POST', payload);
                rows = arr(alt);
                if (rows.length && rows.some(rowHasCoordinates)) break;
              } catch (_) {}
            }
          }

          // Deep fallback: some servers return empty/null coords for bulk array,
          // but return proper coordinates when queried per vehicle ID.
          if (rows.length && !rows.some(rowHasCoordinates) && idChunk.length) {
            const granularRows = [];
            for (const singleId of idChunk) {
              try {
                const single = await app.api.getLastData([singleId]);
                const singleRows = arr(single);
                if (singleRows.length) {
                  granularRows.push(...singleRows.map(r => ({ ...r, __source: 'lastdata-single' })));
                }
              } catch (_) {}
            }
            if (granularRows.some(rowHasCoordinates)) {
              rows = granularRows;
            }
          }

          results.push(...rows.map(r => ({ ...r, __source: 'lastdata' })));
        } catch (e) {
          console.warn('getlastdata batch failed', e);
        }
      }

      // Some installations return live telemetry only via /vehicles/find payload.
      if (!results.length) {
        try {
          const vehiclesFallback = await app.api.getVehicles();
          const fallbackRows = arr(vehiclesFallback);
          if (fallbackRows.length) results.push(...fallbackRows.map(r => ({ ...r, __source: 'vehiclesFind' })));
          vehiclesSnapshotRows = fallbackRows;
        } catch (_) {}
      }

      // Coordinate fallback source even when getlastdata returns rows without lat/lng.
      if (!vehiclesSnapshotRows.length) {
        try {
          const vehiclesFallback = await app.api.getVehicles();
          vehiclesSnapshotRows = arr(vehiclesFallback);
        } catch (_) {}
      }

      const identityIndex = buildVehicleIdentityIndex();
      const identityConflicts = [...identityIndex.indexConflicts];
      const snapshotById = new Map();
      const snapshotByGuid = new Map();
      const snapshotByNumber = new Map();
      const lastDataDiag = collectCoordinateDiagnostics(results, 'getlastdata');
      const vehiclesFindDiag = collectCoordinateDiagnostics(vehiclesSnapshotRows, 'vehicles/find');
      for (const row of vehiclesSnapshotRows) {
        const rowId = extractRowVehicleKey(row);
        const rowGuid = extractRowVehicleGuid(row);
        const rowNumber = extractRowVehicleNumber(row);
        const coord = extractLatLng(row);
        const hasCoord = Number.isFinite(coord.lat) && Number.isFinite(coord.lng);
        if (!hasCoord) {
          continue;
        }
        if (rowId) snapshotById.set(rowId, coord);
        if (rowGuid) snapshotByGuid.set(rowGuid, coord);
        if (rowNumber) snapshotByNumber.set(rowNumber, coord);
      }

      const previousById = app.lastById || {};
      app.lastById = {};
      let fallbackUsed = 0;
      let noGpsLiveRows = 0;
      let identitySkipped = 0;

      for (const row of results) {
        const { id, rowKey, rowGuid, rowNumber, conflict } = resolveVehicleIdentity(row, identityIndex, identityConflicts);
        if (!id) {
          if (conflict) identitySkipped++;
          continue;
        }

        let { lat, lng } = extractLatLng(row);
        const rowHasRawCoord = Number.isFinite(lat) && Number.isFinite(lng);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          const fromSnapshot = snapshotById.get(rowKey)
            || snapshotByGuid.get(rowGuid)
            || snapshotByNumber.get(rowNumber);
          if (fromSnapshot) {
            lat = fromSnapshot.lat;
            lng = fromSnapshot.lng;
          }
        }
        const prev = previousById[id] || app.lastKnownById[id] || {};
        const resolvedLat = Number.isFinite(lat) ? lat : toFiniteNumber(prev.latitude);
        const resolvedLng = Number.isFinite(lng) ? lng : toFiniteNumber(prev.longitude);
        const usedFallbackCoord = !Number.isFinite(lat) || !Number.isFinite(lng);
        if (usedFallbackCoord && Number.isFinite(resolvedLat) && Number.isFinite(resolvedLng)) fallbackUsed++;
        if (!rowHasRawCoord) noGpsLiveRows++;

        if (Number.isFinite(resolvedLat) && Number.isFinite(resolvedLng)) {
          app.lastKnownById[id] = {
            vehicleId: id,
            latitude: resolvedLat,
            longitude: resolvedLng,
            lastSeenAt: row.receiveTime ?? row.ReceiveTime ?? row.recordTime ?? row.RecordTime ?? prev.lastSeenAt ?? null,
            address: row.address ?? row.Address ?? prev.address ?? 'Noma’lum'
          };
        }

        const dyn = extractSpeedCourseTime(row);
        const displaySpeed = rowHasRawCoord ? dyn.speed : 0;
        const dynMs = parseApiTimeMs(dyn.receiveTime || dyn.recordTime || row.gpsTime || row.GpsTime || row.positionTime || row.PositionTime);
        const prevLat = toFiniteNumber(prev.latitude);
        const prevLng = toFiniteNumber(prev.longitude);
        const movedByCoords = rowHasRawCoord
          && Number.isFinite(prevLat)
          && Number.isFinite(prevLng)
          && haversineKm([prevLat, prevLng], [resolvedLat, resolvedLng]) >= 0.15; // >=150m
        const isMovingSignal = rowHasRawCoord
          && (
            movedByCoords
            || displaySpeed > 8
            || MOVING_STATE_CODES.has(extractRowStateCode(row))
          );
        if (!app.lastMovementAtById[id] && Number.isFinite(dynMs)) {
          app.lastMovementAtById[id] = new Date(dynMs).toISOString();
        } else if (isMovingSignal && Number.isFinite(dynMs)) {
          app.lastMovementAtById[id] = new Date(dynMs).toISOString();
        }
        const prevActivity = Number(app.activityById[id] || 0) * 0.985;
        const activityBoost =
          (rowHasRawCoord ? 1 : 0)
          + (displaySpeed > 0 ? 0.8 : 0)
          + (isMovingSignal ? 3.5 : 0)
          + ((Array.isArray(row.geozones ?? row.Geozones) && (row.geozones ?? row.Geozones).length) ? 0.6 : 0);
        app.activityById[id] = Math.min(100000, prevActivity + activityBoost);

        app.lastById[id] = {
          vehicleId: id,
          speed: displaySpeed,
          state: extractRowStateCode(row),
          source: rowHasRawCoord ? (row.__source || 'lastdata') : 'no-gps',
          lastMovementTime: app.lastMovementAtById[id] || null,
          course: dyn.course,
          latitude: resolvedLat,
          longitude: resolvedLng,
          receiveTime: dyn.receiveTime,
          recordTime: dyn.recordTime,
          gpsTime: row.gpsTime ?? row.GpsTime ?? row.positionTime ?? row.PositionTime,
          positionTime: row.positionTime ?? row.PositionTime ?? row.lastDataTime ?? row.LastDataTime,
          lastDataTime: row.lastDataTime ?? row.LastDataTime,
          address: row.address ?? row.Address ?? 'Noma’lum',
          geozones: row.geozones ?? row.Geozones ?? []
        };
      }

      app.vehicles.forEach(v => {
        if (!app.lastById[v.vehicleId]) {
          const saved = app.lastKnownById[v.vehicleId] || {};
          const lat = toFiniteNumber(saved.latitude);
          const lng = toFiniteNumber(saved.longitude);
          app.lastById[v.vehicleId] = {
            vehicleId: v.vehicleId,
            speed: 0,
            state: null,
            source: 'cached',
            lastMovementTime: app.lastMovementAtById[v.vehicleId] || null,
            course: 0,
            latitude: lat,
            longitude: lng,
            receiveTime: saved.lastSeenAt || null,
            recordTime: saved.lastSeenAt || null,
            address: saved.address || 'Noma’lum',
            geozones: []
          };
          if (Number.isFinite(lat) && Number.isFinite(lng)) fallbackUsed++;
        }
      });

      saveLastKnownToStorage();
      saveMotionStateToStorage();

      const withCoords = Object.values(app.lastById).filter(d => Number.isFinite(d.latitude) && Number.isFinite(d.longitude)).length;
      const coordsOnly = Object.values(app.lastById).filter(d => Number.isFinite(d.latitude) && Number.isFinite(d.longitude));
      const lats = coordsOnly.map(d => d.latitude);
      const lngs = coordsOnly.map(d => d.longitude);
      const coordRange = coordsOnly.length
        ? `lat=[${Math.min(...lats).toFixed(4)}..${Math.max(...lats).toFixed(4)}], lng=[${Math.min(...lngs).toFixed(4)}..${Math.max(...lngs).toFixed(4)}]`
        : '';
      app.diagnostics = {
        vehiclesTotal: app.vehicles.length,
        lastDataRows: results.length,
        withCoords,
        withoutCoords: Math.max(app.vehicles.length - withCoords, 0),
        error: results.length === 0
          ? 'getlastdata bo‘sh javob qaytarmoqda (ID sxema yoki API huquqlari muammosi bo‘lishi mumkin)'
          : '',
        info: [
          fallbackUsed ? `${fallbackUsed} ta transport oxirgi saqlangan koordinata bilan ko‘rsatildi` : '',
          noGpsLiveRows ? `${noGpsLiveRows} ta transportda jonli koordinata kelmadi (tezlik 0 ga tushirildi)` : '',
          identitySkipped ? `${identitySkipped} ta qator identity conflict sabab skip qilindi` : ''
        ].filter(Boolean).join('; '),
        coordDiagnostics: ''
      };
      if (coordRange) {
        app.diagnostics.coordDiagnostics = coordRange;
      } else if (results.length) {
        const sample = buildCoordDebugSample(results[0]);
        if (sample) {
          app.diagnostics.coordDiagnostics = `sample=${sample}`;
        }
      }
      const diagChunks = [
        formatCoordDiagnostics(lastDataDiag),
        formatCoordDiagnostics(vehiclesFindDiag)
      ].filter(Boolean);
      if (diagChunks.length) {
        app.diagnostics.coordDiagnostics = app.diagnostics.coordDiagnostics
          ? `${app.diagnostics.coordDiagnostics}; ${diagChunks.join('; ')}`
          : diagChunks.join('; ');
      }
      if (!lastDataDiag.withCoords && lastDataDiag.sampleNoCoords) {
        app.diagnostics.coordDiagnostics += `${app.diagnostics.coordDiagnostics ? '; ' : ''}lastDataSampleNoCoords=${lastDataDiag.sampleNoCoords}`;
      }
      if (!vehiclesFindDiag.withCoords && vehiclesFindDiag.sampleNoCoords) {
        app.diagnostics.coordDiagnostics += `${app.diagnostics.coordDiagnostics ? '; ' : ''}findSampleNoCoords=${vehiclesFindDiag.sampleNoCoords}`;
      }
      if (identityConflicts.length) {
        const conflictInfo = `Identity conflictlar: ${identityConflicts.length} ta (${identityConflicts.slice(0, 3).join(' | ')})`;
        app.diagnostics.info = app.diagnostics.info
          ? `${app.diagnostics.info}; ${conflictInfo}`
          : conflictInfo;
      }
      setUiState({ apiState: 'yaxshi', lastSyncAt: new Date().toISOString() });

      renderMarkers();
      renderList();
      if (app.selectedId) renderDetails(app.selectedId);

      if (!results.length || withCoords === 0) {
        banner(`Ko‘rinadigan transport koordinatalari yo‘q (qatorlar: ${results.length}, koordinatalar: ${withCoords}). Qurilmalar offlayn yoki GPS signali yo‘q bo‘lishi mumkin.`);
      } else if (fallbackUsed > 0) {
        banner(`${fallbackUsed} ta transport oxirgi ma’lum joylashuv bo‘yicha xaritada saqlandi.`);
      }
    }

    async function bootstrap() {
      const vehicles = await app.api.getVehicles();
      const vehicleRows = arr(vehicles);
      app.vehicles = vehicleRows.map(v => ({
        vehicleId: normalizeKey(v.vehicleId ?? v.VehicleId ?? v.id ?? v.Id ?? v.vehicleGuid ?? v.VehicleGuid ?? v.guid ?? v.Guid),
        vehicleGuid: normalizeKey(v.vehicleGuid ?? v.VehicleGuid ?? v.guid ?? v.Guid),
        vehicleNumber: normalizeKey(v.vehicleNumber ?? v.VehicleNumber ?? v.plate ?? v.Plate),
        name: v.name ?? v.Name ?? v.vehicleNumber ?? `Transport ${v.vehicleId ?? v.VehicleId ?? v.id ?? v.Id}`
      })).filter(v => !!v.vehicleId);

      for (const v of vehicleRows) {
        const id = normalizeKey(v.vehicleId ?? v.VehicleId ?? v.id ?? v.Id ?? v.vehicleGuid ?? v.VehicleGuid ?? v.guid ?? v.Guid);
        if (!id) continue;
        const { lat, lng } = extractLatLng(v);
        if (Number.isFinite(lat) && Number.isFinite(lng)) {
          app.lastKnownById[id] = {
            vehicleId: id,
            latitude: lat,
            longitude: lng,
            lastSeenAt: v.receiveTime ?? v.ReceiveTime ?? v.recordTime ?? v.RecordTime ?? null,
            address: v.address ?? v.Address ?? 'Noma’lum'
          };
        }
      }
      saveLastKnownToStorage();

      if (!app.vehicles.length) throw new Error('API tomonidan transportlar qaytmadi');
      await refreshLastData();
      selectVehicle(app.vehicles[0].vehicleId);

      restartPolling();
    }

    async function loginAndBootstrap() {
      const login = AUTO_LOGIN_CREDENTIALS.login;
      const password = AUTO_LOGIN_CREDENTIALS.password;
      const data = await app.api.login(login, password);
      if (!data || !data.AuthId) {
        throw new Error(data?.Error || 'Avtomatik kirishda AuthId topilmadi');
      }
      app.api.token = data.AuthId;
      document.getElementById('userLabel').textContent = data?.User?.name || data?.User?.login || login;
      setTimeout(mapGuard, 50);
      setTimeout(mapGuard, 250);
      await bootstrap();
    }

    document.getElementById('search').addEventListener('input', renderList);

    document.getElementById('logoutBtn').addEventListener('click', () => {
      app.api.token = null;
      clearInterval(app.pollId);
      setUiState({ apiState: 'kutish', lastSyncAt: null });
      document.getElementById('userLabel').textContent = 'Qayta ulanmoqda...';
      loginAndBootstrap().catch((e) => {
        app.diagnostics.error = String(e.message || e);
        setUiState({ apiState: 'xatolik' });
        showToast('Avtomatik qayta kirishda xatolik yuz berdi.', { type: 'error', timeout: 5000 });
      });
    });

    app.api.onRequestStateChange = (isStart) => {
      app.ui.inFlightRequests += isStart ? 1 : -1;
      if (app.ui.inFlightRequests < 0) app.ui.inFlightRequests = 0;
      if (app.ui.inFlightRequests > 0 && app.ui.online && app.ui.apiState !== 'xatolik') {
        app.ui.apiState = 'so‘rov yuborilmoqda';
      } else if (app.ui.inFlightRequests === 0 && app.ui.online && app.ui.apiState !== 'xatolik') {
        app.ui.apiState = 'yaxshi';
      }
      updateHealthStrip();
    };

    window.addEventListener('online', () => {
      setUiState({ online: true, apiState: app.ui.apiState !== 'xatolik' ? 'yaxshi' : app.ui.apiState });
    });

    window.addEventListener('offline', () => {
      setUiState({ online: false, apiState: 'xatolik' });
    });

    document.getElementById('goTashkentBtn').addEventListener('click', () => {
      if (!app.map) return;
      app.map.setView(CONFIG.DEFAULT_CENTER, CONFIG.DEFAULT_ZOOM, { animate: true });
      banner('Xarita Toshkent markaziga qaytarildi.');
    });

    document.getElementById('fitAllBtn').addEventListener('click', () => {
      fitAllMarkers();
    });

    {
      const toggleBtn = document.getElementById('mapActionsToggleBtn');
      const panel = document.getElementById('mapActionsPanel');
      const setOpen = (open) => {
        panel.classList.toggle('open', !!open);
        toggleBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
      };

      toggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        setOpen(!panel.classList.contains('open'));
      });

      panel.addEventListener('click', (e) => e.stopPropagation());
      document.addEventListener('click', () => setOpen(false));
    }

    document.getElementById('followSelectedBtn').addEventListener('click', () => {
      app.followSelected = !app.followSelected;
      const btn = document.getElementById('followSelectedBtn');
      btn.classList.toggle('active', app.followSelected);
      btn.textContent = `Kuzatish: ${app.followSelected ? 'ON' : 'OFF'}`;
      btn.setAttribute('aria-pressed', String(app.followSelected));
      if (app.followSelected && app.selectedId !== null && app.selectedId !== undefined) {
        const d = app.lastById[app.selectedId];
        if (d && Number.isFinite(d.latitude) && Number.isFinite(d.longitude)) {
          app.map.panTo([d.latitude, d.longitude], { animate: true });
        }
      }
    });

    function setLegendCollapsed(collapsed) {
      const legend = document.getElementById('statusLegend');
      const btn = document.getElementById('legendToggleBtn');
      if (!legend || !btn) return;
      legend.classList.toggle('collapsed', collapsed);
      btn.textContent = collapsed ? 'Yoyish' : 'Yig‘ish';
      btn.setAttribute('aria-pressed', String(collapsed));
      try { localStorage.setItem(STATUS_LEGEND_COLLAPSED_KEY, collapsed ? '1' : '0'); } catch (_) {}
    }

    document.getElementById('legendToggleBtn').addEventListener('click', () => {
      const legend = document.getElementById('statusLegend');
      const collapsed = !legend.classList.contains('collapsed');
      setLegendCollapsed(collapsed);
    });

    {
      const routesQuickBtn = document.getElementById('routesQuickBtn');
      if (routesQuickBtn) {
        routesQuickBtn.addEventListener('click', async () => {
          setActiveTab('routes');
          await loadRoutesPanel(app.selectedId);
          banner('Yo‘nalishlar oynasi ochildi.');
        });
      }
    }

    function openDiagnosticsModal() {
      renderOpsDiagnostics();
      document.getElementById('diagnosticsModal').classList.remove('hidden');
    }

    function closeDiagnosticsModal() {
      document.getElementById('diagnosticsModal').classList.add('hidden');
    }

    document.getElementById('diagnosticsBtn').addEventListener('click', openDiagnosticsModal);
    document.getElementById('diagnosticsCloseBtn').addEventListener('click', closeDiagnosticsModal);

    function openSettingsModal() {
      document.getElementById('setPollInterval').value = String(Math.round(CONFIG.POLL_INTERVAL / 1000));
      document.getElementById('setOfflineMin').value = String(CONFIG.OFFLINE_MIN);
      document.getElementById('setBatchSize').value = String(CONFIG.BATCH_SIZE);
      document.getElementById('setClusterThreshold').value = String(app.settings.clusterThreshold || 50);
      document.getElementById('setClusterGridPx').value = String(app.settings.clusterGridPx || 80);
      document.getElementById('setRetryAttempts').value = String(app.settings.retryAttempts || CONFIG.RETRY_ATTEMPTS || 3);
      document.getElementById('setRetryBackoffMs').value = String(app.settings.retryBackoffMs || CONFIG.RETRY_BACKOFF_BASE_MS || 1000);
      document.getElementById('settingsModal').classList.remove('hidden');
    }

    function closeSettingsModal() {
      document.getElementById('settingsModal').classList.add('hidden');
    }

    document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);
    document.getElementById('settingsCancelBtn').addEventListener('click', closeSettingsModal);
    document.getElementById('settingsSaveBtn').addEventListener('click', () => {
      const poll = Number(document.getElementById('setPollInterval').value || 10);
      const offlineMin = Number(document.getElementById('setOfflineMin').value || 10);
      const batch = Number(document.getElementById('setBatchSize').value || 100);
      const clusterThreshold = Number(document.getElementById('setClusterThreshold').value || 50);
      const clusterGridPx = Number(document.getElementById('setClusterGridPx').value || 80);
      const retryAttempts = Number(document.getElementById('setRetryAttempts').value || 3);
      const retryBackoffMs = Number(document.getElementById('setRetryBackoffMs').value || 1000);

      app.settings = {
        ...app.settings,
        pollInterval: Math.max(5, Math.min(120, poll)),
        offlineMin: Math.max(1, Math.min(120, offlineMin)),
        batchSize: Math.max(1, Math.min(200, batch)),
        clusterThreshold: Math.max(10, Math.min(500, clusterThreshold)),
        clusterGridPx: Math.max(40, Math.min(160, clusterGridPx)),
        retryAttempts: Math.max(1, Math.min(8, retryAttempts)),
        retryBackoffMs: Math.max(200, Math.min(5000, retryBackoffMs))
      };

      saveSettingsToStorage();
      applySettingsToConfig();
      restartPolling();
      syncMarkerClusterState();
      banner('Sozlamalar saqlandi.');
      closeSettingsModal();
    });

    document.getElementById('exportDiagBtn').addEventListener('click', () => {
      const report = buildDiagnosticsReportText();
      downloadTextFile(`fleet-diagnostics-${Date.now()}.txt`, report);
      banner('Diagnostika hisoboti yuklab olindi.');
    });

    app.map = L.map('map', { preferCanvas: true }).setView(CONFIG.DEFAULT_CENTER, CONFIG.DEFAULT_ZOOM);
    app.map.createPane('vehiclesPane');
    app.map.getPane('vehiclesPane').style.zIndex = '690';
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(app.map);

    const mapGuard = () => { try { app.map.invalidateSize(true); } catch (_) {} };
    setTimeout(mapGuard, 60);
    setTimeout(mapGuard, 300);
    loadSettingsFromStorage();
    applySettingsToConfig();
    app.lastKnownById = loadLastKnownFromStorage();
    {
      const motion = loadMotionStateFromStorage();
      app.lastMovementAtById = motion.lastMovementAtById;
      app.activityById = motion.activityById;
    }
    wireTabs();
    const persistedTab = (() => {
      try { return localStorage.getItem(ACTIVE_TAB_STORAGE_KEY); } catch (_) { return null; }
    })();
    setActiveTab(['stops','fuel','mileage','routes'].includes(persistedTab) ? persistedTab : 'stops');
    const persistedLegendCollapsed = (() => {
      try { return localStorage.getItem(STATUS_LEGEND_COLLAPSED_KEY) === '1'; } catch (_) { return false; }
    })();
    setLegendCollapsed(persistedLegendCollapsed);
    updateTabCounts();
    updateReportControlsState();
    renderOpsDiagnostics();
    updateHealthStrip();
    app.map.on('zoomend moveend', () => syncMarkerClusterState());
    window.addEventListener('resize', mapGuard);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) mapGuard(); });

    loginAndBootstrap().catch((e) => {
      app.diagnostics.error = String(e.message || e);
      setUiState({ apiState: 'xatolik' });
      document.getElementById('userLabel').textContent = 'Avtomatik kirish bajarilmadi';
      showToast('Avtomatik kirishda xatolik yuz berdi. API ulanishini tekshiring.', { type: 'error', timeout: 6000 });
    });

    function escapeHtml(v) {
      return String(v ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
    function formatDate(v) {
      const ms = parseApiTimeMs(v);
      if (!Number.isFinite(ms)) return '—';
      const d = new Date(ms);
      if (Number.isNaN(d.getTime())) return '—';
      return d.toLocaleString('uz-UZ', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
        hourCycle: 'h23'
      });
    }

    function parseApiTimeMs(v) {
      if (v === null || v === undefined || v === '') return NaN;

      if (typeof v === 'number' && Number.isFinite(v)) {
        // Heuristic: 10-digit unix seconds vs 13-digit milliseconds
        return v < 1e11 ? v * 1000 : v;
      }

      const s = String(v).trim();
      if (!s) return NaN;

      // .NET date format: /Date(1709473605000)/ or /Date(1709473605000+0400)/
      const dotNet = s.match(/\/Date\((-?\d+)([+-]\d{4})?\)\//);
      if (dotNet) {
        const baseMs = Number(dotNet[1]);
        if (!Number.isFinite(baseMs)) return NaN;
        if (!dotNet[2]) return baseMs;

        const sign = dotNet[2][0] === '-' ? -1 : 1;
        const hh = Number(dotNet[2].slice(1, 3));
        const mm = Number(dotNet[2].slice(3, 5));
        const offsetMs = sign * ((hh * 60 + mm) * 60 * 1000);
        return baseMs - offsetMs;
      }

      // Numeric string unix timestamp
      if (/^-?\d+(\.\d+)?$/.test(s)) {
        const n = Number(s);
        if (!Number.isFinite(n)) return NaN;
        return n < 1e11 ? n * 1000 : n;
      }

      const parsed = Date.parse(s);
      return Number.isFinite(parsed) ? parsed : NaN;
    }

    function parseApiStatus(rawMessage) {
      const msg = String(rawMessage || '');
      const m = msg.match(/API_(\d{3})/);
      return m ? Number(m[1]) : null;
    }

    function parseDateMs(v) {
      const ms = Date.parse(v);
      return Number.isFinite(ms) ? ms : null;
    }

    function normalizeDurationSeconds(rawDuration, startMs = null, endMs = null) {
      const raw = Number(rawDuration);
      const hasRaw = Number.isFinite(raw) && raw >= 0;
      const diffSeconds = (Number.isFinite(startMs) && Number.isFinite(endMs) && endMs >= startMs)
        ? (endMs - startMs) / 1000
        : null;

      if (!hasRaw) return Number.isFinite(diffSeconds) ? diffSeconds : 0;

      // API may occasionally return seconds/minutes/milliseconds depending on source.
      const candidates = [raw, raw * 60, raw / 1000].filter(v => Number.isFinite(v) && v >= 0);
      if (Number.isFinite(diffSeconds)) {
        let best = candidates[0];
        let bestDelta = Math.abs(candidates[0] - diffSeconds);
        for (let i = 1; i < candidates.length; i++) {
          const d = Math.abs(candidates[i] - diffSeconds);
          if (d < bestDelta) {
            best = candidates[i];
            bestDelta = d;
          }
        }
        return best;
      }

      if (raw > 100000) return raw / 1000;
      return raw;
    }

    function getStopDurationMinutes(stop, rangeStartMs, rangeEndMs) {
      const startMs = parseDateMs(stop.start ?? stop.Start);
      const endMs = parseDateMs(stop.end ?? stop.End);
      const effectiveEndMs = Number.isFinite(endMs) ? endMs : Date.now();

      const normalizedSeconds = normalizeDurationSeconds(stop.duration ?? stop.Duration, startMs, effectiveEndMs);

      // Show duration inside selected range, not full historical duration.
      if (Number.isFinite(startMs) && Number.isFinite(rangeStartMs) && Number.isFinite(rangeEndMs)) {
        const clipStart = Math.max(startMs, rangeStartMs);
        const clipEnd = Math.min(effectiveEndMs, rangeEndMs);
        if (clipEnd > clipStart) {
          return (clipEnd - clipStart) / 60000;
        }
      }

      return normalizedSeconds / 60;
    }

    function formatMinutesHuman(minutes) {
      const mins = Number(minutes);
      if (!Number.isFinite(mins) || mins < 0) return '—';
      if (mins < 60) return `${mins.toFixed(1)} daqiqa`;
      const total = Math.round(mins);
      const h = Math.floor(total / 60);
      const m = total % 60;
      return `${h} soat ${m} daqiqa`;
    }

    function isTimeoutLikeError(rawMessage) {
      const msg = String(rawMessage || '').toLowerCase();
      return msg.includes('abort') || msg.includes('timeout') || msg.includes('time out') || msg.includes('operation was aborted');
    }

    function explainErrorUz(rawMessage, context = '') {
      const raw = String(rawMessage || 'Noma’lum xatolik');
      const lower = raw.toLowerCase();
      const status = parseApiStatus(raw);

      if (lower.includes('auth_401')) {
        return {
          short: 'Sessiya muddati tugagan yoki login/parol xato.',
          action: 'Qayta tizimga kiring va ma’lumotlarni tekshiring.',
          technical: '401 (AUTH_401)'
        };
      }

      if (lower.includes('abort') || lower.includes('timeout')) {
        return {
          short: 'So‘rov vaqti tugadi.',
          action: 'Internetni tekshiring va qayta urinib ko‘ring.',
          technical: raw
        };
      }

      if (lower.includes('failed to fetch') || lower.includes('networkerror')) {
        return {
          short: 'Tarmoqqa ulanishda muammo bor.',
          action: 'Internet, VPN yoki API manziliga ulanishni tekshiring.',
          technical: raw
        };
      }

      if (status === 429) {
        return {
          short: 'So‘rovlar soni juda tez yuborildi (rate limit).',
          action: 'Bir oz kuting va qayta urinib ko‘ring.',
          technical: '429'
        };
      }

      if (status === 401) {
        return {
          short: 'Ruxsat yo‘q (401).',
          action: 'Qayta login qiling.',
          technical: raw
        };
      }

      if (status === 403) {
        return {
          short: 'Ushbu amal uchun ruxsat yetarli emas (403).',
          action: 'Hisob huquqlarini administrator bilan tekshiring.',
          technical: raw
        };
      }

      if (status === 404) {
        return {
          short: 'Kerakli API endpoint topilmadi (404).',
          action: 'API versiyasi/manzilini tekshiring.',
          technical: raw
        };
      }

      if (status && status >= 500) {
        return {
          short: 'Server tomonda xatolik yuz berdi.',
          action: 'Bir ozdan keyin qayta urinib ko‘ring.',
          technical: raw
        };
      }

      return {
        short: context ? `${context} jarayonida xatolik yuz berdi.` : 'Xatolik yuz berdi.',
        action: 'Qayta urinib ko‘ring yoki texnik ma’lumotni yuboring.',
        technical: raw
      };
    }

    function formatErrorBlockUz(rawMessage, context = '') {
      const e = explainErrorUz(rawMessage, context);
      return `${e.short} ${e.action} (Texnik: ${e.technical})`;
    }

    function toCsvCell(value) {
      const normalized = String(value ?? '')
        .replace(/\r?\n/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      return `"${normalized.replaceAll('"', '""')}"`;
    }

    function buildCsvContent(header, rows) {
      const lines = [];
      lines.push(header.map(toCsvCell).join(','));
      for (const row of rows) lines.push(row.map(toCsvCell).join(','));
      // UTF-8 BOM + CRLF improves Excel compatibility for Uzbek text
      return '\uFEFF' + lines.join('\r\n');
    }

    function csvFileNameByTab(tabKey) {
      const map = {
        stops: 'toxtashlar-hisoboti.csv',
        fuel: 'yoqilgi-hisoboti.csv',
        mileage: 'yurgan-masofa-hisoboti.csv',
        routes: 'yonalishlar-hisoboti.csv'
      };
      return map[tabKey] || 'hisobot.csv';
    }
  </script>
