<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avtopark Boshqaruv Paneli</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root {
      --bg-primary: #0F1419;
      --bg-secondary: #1A1F2E;
      --bg-tertiary: #252B3D;
      --sidebar-bg: #16213e;
      --topbar-bg: #1a1a2e;
      --panel-bg: #0f3460;
      --available: #00d26a;
      --enroute: #4d96ff;
      --busy: #e94560;
      --offline: #6c757d;
      --warning: #ffc107;
      --text-primary: #ffffff;
      --text-secondary: #b8b8b8;
      --accent: #00D4AA;
      --text: #fff;
      --muted: #8B949E;
      --border: 1px solid rgba(255,255,255,0.1);
      --moving: #00C853;
      --stopped: #FF1744;
      --idle: #FFD600;
      --offline: #9E9E9E;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg-primary); color: var(--text); font-family: Arial, sans-serif; font-size: 16px; }
    .app { height: 100vh; display: grid; grid-template-rows: 60px 1fr; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 0 12px; background: var(--sidebar-bg); border-bottom: var(--border); gap: 10px; }
    .header-main { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .header-search { flex: 1; min-width: 180px; max-width: 420px; }
    .header-search input { height: 38px; }
    .top-counters { display: inline-flex; gap: 10px; align-items: center; font-size: 13px; }
    .counter-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 8px; border-radius: 999px; border: var(--border); background: rgba(255,255,255,0.06); }
    .counter-pill.available { color: var(--available); }
    .counter-pill.active { color: var(--enroute); }
    .counter-pill.offline { color: var(--offline); }
    .top-actions { display: inline-flex; align-items: center; gap: 8px; }
    .icon-btn { background: rgba(255,255,255,0.08); color: #fff; border: var(--border); width: 34px; height: 34px; border-radius: 50%; padding: 0; font-size: 16px; }
    .health-strip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      border: var(--border);
      background: rgba(255,255,255,0.04);
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    .health-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      background: #9E9E9E;
    }
    .layout { min-height: 0; display: grid; grid-template-columns: 340px 1fr; }
    .main-pane { min-height: 0; display: grid; grid-template-rows: 1fr 250px; }
    .sidebar { min-height: 0; display: grid; grid-template-rows: auto auto 1fr; background: var(--sidebar-bg); border-right: var(--border); }
    .section { padding: 12px; border-bottom: var(--border); }
    .search-controls {
      display: grid;
      gap: 8px;
    }
    .status-filters { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
    .filter-btn { padding: 6px 6px; font-size: 12px; background: rgba(255,255,255,0.08); color: #dce7f8; border: var(--border); }
    .filter-btn.active { background: rgba(0,212,170,0.24); border-color: rgba(0,212,170,0.85); color: #fff; }
    input, button { border-radius: 8px; border: var(--border); }
    input {
      width: 100%;
      padding: 11px;
      background: var(--bg-tertiary);
      color: var(--text);
      transition: box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }
    input:focus {
      outline: none;
      border-color: rgba(0, 212, 170, 0.7);
      box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.2);
      background: #2a3248;
    }
    button {
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      background: var(--accent);
      color: #00231c;
      transition: transform .08s ease, filter .16s ease, box-shadow .16s ease;
    }
    button:hover { filter: brightness(1.05); box-shadow: 0 2px 10px rgba(0,0,0,.25); }
    button:active { transform: translateY(1px) scale(0.99); }
    button:focus-visible,
    input:focus-visible {
      outline: 2px solid rgba(0, 212, 170, 0.9);
      outline-offset: 2px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      filter: grayscale(0.2);
      box-shadow: none;
    }
    #vehicle-list { min-height: 0; overflow: auto; padding: 6px; }
    .item {
      border: var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: background .15s ease, transform .08s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .item:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.22);
    }
    .item:active { transform: scale(0.995); }
    .item.active {
      border-color: rgba(0, 212, 170, 0.9);
      background: rgba(0, 212, 170, 0.14);
      box-shadow: inset 0 0 0 1px rgba(0, 212, 170, 0.3);
    }
    .item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
    }
    .item-title {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .item-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .item-speed { font-size: 12px; color: var(--muted); }
    .item-meta {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .muted { color: var(--muted); font-size: 14px; }
    .diag { margin-top: 8px; padding: 8px; border: var(--border); border-radius: 8px; background: rgba(255,255,255,0.03); }
    #details {
      border-top: var(--border);
      padding: 10px;
      min-width: 0;
      overflow: hidden;
    }
    #details .detail-title {
      font-weight: 700;
      color: #f2f7ff;
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #details .detail-row {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 6px;
      align-items: start;
      margin-bottom: 4px;
      min-width: 0;
      font-size: 13px;
      line-height: 1.35;
    }
    #details .detail-label {
      color: #9fb0c8;
      white-space: nowrap;
    }
    #details .detail-value {
      min-width: 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      color: #dbe7f7;
    }
    #details .diag {
      margin-top: 10px;
      max-height: 180px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.35;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    #map { height: 100%; width: 100%; }
    .bottom-panel { border-top: var(--border); background: var(--sidebar-bg); min-height: 0; display: grid; grid-template-rows: auto 1fr; }
    .tabs { display: flex; gap: 10px; padding: 10px; border-bottom: var(--border); }
    .tab { background: transparent; color: var(--text); border: var(--border); }
    .tab.active { background: rgba(0,212,170,0.14); border-color: rgba(0,212,170,0.8); }
    .panel-content { min-height: 0; overflow: auto; padding: 12px; font-size: 15px; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { border-bottom: var(--border); padding: 8px; text-align: left; font-size: 14px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
    .map-actions {
      position: absolute;
      right: 12px;
      top: 72px;
      z-index: 1200;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .map-actions-panel {
      display: none;
      grid-template-columns: 1fr;
      gap: 8px;
      min-width: 220px;
      padding: 8px;
      border: var(--border);
      border-radius: 10px;
      background: rgba(10, 14, 22, 0.96);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
    }
    .map-actions-panel.open {
      display: grid;
    }
    .map-menu-toggle {
      width: 42px;
      height: 42px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .map-controls {
      position: absolute;
      right: 12px;
      bottom: 136px;
      z-index: 1200;
      display: grid;
      gap: 6px;
    }
    .map-action-btn {
      background: rgba(15, 20, 30, 0.96);
      color: #f4f8ff;
      border: var(--border);
      font-size: 14px;
      padding: 8px 10px;
      text-shadow: 0 1px 1px rgba(0,0,0,0.55);
    }
    .map-action-btn.primary {
      background: rgba(0, 212, 170, 0.30);
      border-color: rgba(0,212,170,0.95);
      color: #ffffff;
      font-weight: 700;
    }
    .map-action-btn.secondary {
      background: rgba(10, 14, 22, 0.86);
      color: #eef3ff;
    }
    .map-action-btn.active {
      background: rgba(0,212,170,0.38);
      border-color: rgba(0,212,170,0.8);
      color: #ffffff;
    }
    #fitAllBtn {
      background: rgba(10, 14, 22, 0.94);
      border-color: rgba(0, 212, 170, 0.78);
      color: #e8fff9;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
    }
    #fitAllBtn:hover {
      background: rgba(16, 23, 35, 0.97);
    }
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .settings-grid label {
      font-size: 13px;
      color: var(--muted);
      display: grid;
      gap: 4px;
    }
    .settings-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .status-legend {
      border: var(--border);
      background: rgba(26,31,46,0.92);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }
    .status-legend-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      color: #d3dbe6;
      font-weight: 700;
      font-size: 12px;
    }
    .legend-toggle-btn {
      background: transparent;
      color: var(--muted);
      border: var(--border);
      padding: 3px 8px;
      font-size: 12px;
    }
    .status-legend.collapsed .legend-body {
      display: none;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: var(--border);
      background: rgba(255,255,255,0.05);
    }
    .status-chip.moving { color: #90caf9; }
    .status-chip.idle { color: #ffe082; }
    .status-chip.stopped { color: #ff8a80; }
    .status-chip.offline { color: #b0bec5; }
    .selected-summary {
      margin-top: 8px;
      border: var(--border);
      border-radius: 10px;
      padding: 8px;
      background: rgba(0,212,170,0.08);
      position: sticky;
      top: 8px;
      z-index: 5;
    }
    .selected-summary.hidden { display: none; }
    .selected-summary .name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .tab-badge {
      margin-left: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    .range-chip-group {
      display: inline-flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .range-chip {
      background: rgba(255,255,255,0.08);
      color: #eef3ff;
      border: var(--border);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
    }
    .range-chip.active {
      background: rgba(0,212,170,0.28);
      border-color: rgba(0,212,170,0.9);
      color: #fff;
    }
    .panel-empty {
      border: var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      padding: 14px;
    }
    .panel-empty-title {
      font-weight: 700;
      color: #e7edf7;
      margin-bottom: 6px;
    }
    .panel-empty-hint {
      color: var(--muted);
      font-size: 13px;
    }
    .skeleton-wrap {
      display: grid;
      gap: 8px;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 8px;
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.14) 40%, rgba(255,255,255,0.06) 60%);
      background-size: 200% 100%;
      animation: skeletonShimmer 1.2s linear infinite;
    }
    .skeleton-line.sm { width: 28%; }
    .skeleton-line.md { width: 58%; }
    .skeleton-line.lg { width: 86%; }
    @keyframes skeletonShimmer {
      0% { background-position: 180% 0; }
      100% { background-position: -20% 0; }
    }
    .legend-swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

    .vehicle-marker-wrap {
      width: 72px;
      height: 72px;
      position: relative;
    }
    .vehicle-marker-rotor {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center;
      transition: transform .25s linear;
    }
    .vehicle-mixer-svg {
      width: 72px;
      height: 72px;
      display: block;
      color: currentColor;
      filter: drop-shadow(0 0 3px rgba(0,0,0,.6));
    }
    .vehicle-speed-chip {
      position: absolute;
      left: 46px;
      top: -8px;
      font-size: 11px;
      line-height: 1;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(10, 13, 20, .92);
      border: var(--border);
      color: #fff;
      opacity: 0;
      transform: translateY(3px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .vehicle-plate-chip {
      position: absolute;
      left: 50%;
      top: -24px;
      transform: translateX(-50%);
      font-size: 12px;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(10, 13, 20, .92);
      border: var(--border);
      color: #fff;
      pointer-events: none;
      white-space: nowrap;
      max-width: 116px;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }
    .vehicle-marker-wrap.status-moving {
      color: #1565C0;
      animation: movingGlow 1.15s ease-in-out infinite;
    }
    .vehicle-marker-wrap.status-idle { color: #FFD600; }
    .vehicle-marker-wrap.status-stopped { color: #FF1744; }
    .vehicle-marker-wrap.status-offline { color: #E53935; opacity: 1; }

    @keyframes movingGlow {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(21,101,192,.45)) saturate(1.2); }
      50% { filter: drop-shadow(0 0 14px rgba(21,101,192,.85)) saturate(1.35); }
    }
    .leaflet-marker-icon.marker-selected .vehicle-speed-chip {
      opacity: 1;
      transform: translateY(0);
    }
    .leaflet-marker-icon.marker-selected {
      filter: drop-shadow(0 0 9px rgba(0,212,170,.9));
      z-index: 999 !important;
    }
    .leaflet-marker-icon.marker-dim { opacity: 1; }
    .leaflet-marker-icon.in-geozone .vehicle-mixer-svg {
      filter: drop-shadow(0 0 4px rgba(0, 212, 170, .65));
    }

    .modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 5000; }
    .modal.hidden { display: none; }
    .card { width: min(430px, calc(100vw - 20px)); background: var(--bg-secondary); border: var(--border); border-radius: 12px; padding: 16px; }
    .banner { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); padding: 8px 10px; border-radius: 8px; border: var(--border); background: #263753; color: #d7e8ff; font-size: 12px; z-index: 6000; display: none; }
    .click-ping {
      animation: clickPulse .32s ease;
    }
    @keyframes clickPulse {
      0% { transform: scale(1); }
      45% { transform: scale(1.015); }
      100% { transform: scale(1); }
    }

    .leaflet-marker-icon.vehicle-selected {
      filter: drop-shadow(0 0 10px rgba(0, 212, 170, 0.8));
    }
    .diag-support-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .diag-support-actions .btn-secondary {
      width: 100%;
    }
    .diag-actions-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
      gap: 8px;
    }
    .toast-container {
      position: fixed;
      right: 14px;
      top: 74px;
      z-index: 7000;
      display: grid;
      gap: 8px;
      width: min(380px, calc(100vw - 24px));
    }
    .toast {
      border: var(--border);
      border-radius: 10px;
      background: rgba(18, 24, 36, 0.96);
      color: #e9eef8;
      padding: 10px;
      box-shadow: 0 10px 28px rgba(0,0,0,.28);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .toast-message { font-size: 13px; line-height: 1.35; }
    .toast-actions { display: flex; gap: 6px; }
    .toast-btn {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: var(--border);
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .toast.info { border-left: 3px solid #4FC3F7; }
    .toast.success { border-left: 3px solid #00C853; }
    .toast.warn { border-left: 3px solid #FFD600; }
    .toast.error { border-left: 3px solid #FF5252; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-main">
        <strong>Avtopark Boshqaruv Paneli (Toshkent)</strong>
        <div id="healthStrip" class="health-strip" aria-live="polite">
          <span id="healthDot" class="health-dot"></span>
          <span id="healthText">Tizim holati: kutish...</span>
        </div>
      </div>
      <div>
        <span id="userLabel" class="muted">Kirish qilinmagan</span>
        <button id="logoutBtn">Chiqish</button>
      </div>
    </div>
    <div class="layout">
      <aside class="sidebar">
        <div class="section">
          <div class="search-controls">
            <input id="search" placeholder="Transportni qidirish..." />
          </div>
        </div>
        <div class="section">
          <div id="statusLegend" class="status-legend">
            <div class="status-legend-head">
              <span>Statuslar</span>
              <button id="legendToggleBtn" class="legend-toggle-btn" aria-pressed="false">Yig‘ish</button>
            </div>
            <div class="legend-body">
              <div class="legend-row"><span class="legend-swatch" style="background: var(--moving);"></span>🚚 Harakatda</div>
              <div class="legend-row"><span class="legend-swatch" style="background: var(--idle);"></span>🟡 Bekor turibdi</div>
              <div class="legend-row"><span class="legend-swatch" style="background: var(--stopped);"></span>🟥 To‘xtagan</div>
              <div class="legend-row"><span class="legend-swatch" style="background: var(--offline);"></span>⚪ Offlayn</div>
            </div>
          </div>
          <div id="selectedSummary" class="selected-summary hidden"></div>
        </div>
        <div id="vehicle-list"></div>
        <div id="details"><span class="muted">Transportni tanlang...</span></div>
      </aside>
      <div class="main-pane">
        <div class="map-actions">
          <button id="fitAllBtn" class="map-action-btn primary" title="Barcha transportlarni ko‘rsatish">Barchasini sig‘dirish</button>
          <button id="mapActionsToggleBtn" class="map-action-btn secondary map-menu-toggle" title="Xarita menyusini ochish/yopish" aria-expanded="false" aria-controls="mapActionsPanel">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/>
            </svg>
          </button>
          <div id="mapActionsPanel" class="map-actions-panel" role="menu" aria-label="Xarita menyusi">
            <button id="goTashkentBtn" class="map-action-btn secondary" title="Xaritani Toshkentga qaytarish">Toshkentga qaytish</button>
            <button id="followSelectedBtn" class="map-action-btn primary" title="Tanlangan transportni kuzatib borish" aria-pressed="false">Kuzatish: OFF</button>
            <button id="diagnosticsBtn" class="map-action-btn secondary" title="Qo‘llab-quvvatlash diagnostikasi">Diagnostika</button>
            <button id="settingsBtn" class="map-action-btn secondary" title="Panel sozlamalari">Sozlamalar</button>
          </div>
        </div>
        <div id="map"></div>
        <section class="bottom-panel">
          <div class="tabs">
            <button class="tab active" data-tab="stops">To‘xtashlar <span id="tabCountStops" class="tab-badge">0</span></button>
            <button class="tab" data-tab="fuel">Yoqilg‘i <span id="tabCountFuel" class="tab-badge">0</span></button>
            <button class="tab" data-tab="mileage">Yurgan masofa <span id="tabCountMileage" class="tab-badge">0</span></button>
            <button class="tab" data-tab="routes">Yo‘nalishlar <span id="tabCountRoutes" class="tab-badge">0</span></button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const runtimeApiBase = new URLSearchParams(window.location.search).get('apiBase');
    const hasHttpOrigin = /^https?:$/i.test(window.location.protocol);
    const localProxyBase = 'http://127.0.0.1:8090/gps-api';

    const CONFIG = {
      // Default to local proxy to avoid browser CORS issues with direct HTTPS API calls.
      // Override example: ?apiBase=https://baku.gps.az
      API_BASE_URL: runtimeApiBase || (hasHttpOrigin ? `${window.location.origin}/gps-api` : localProxyBase),
      DEFAULT_CENTER: [41.3111, 69.2797], // Tashkent
      DEFAULT_ZOOM: 12,
      POLL_INTERVAL: 10000,
      MIN_REQ_DELAY: 1000,
      REQUEST_TIMEOUT_MS: 25000,
      LONG_REPORT_TIMEOUT_MS: 90000,
      OFFLINE_MIN: 10,
      // Mark vehicle offline only after prolonged no-activity window.
      OFFLINE_BY_NO_MOVEMENT_DAYS: 3,
      BATCH_SIZE: 100,
      RETRY_ATTEMPTS: 3,
      RETRY_BACKOFF_BASE_MS: 1000
    };

    const SETTINGS_STORAGE_KEY = 'fleet_dashboard_settings_v1';
    const ACTIVE_TAB_STORAGE_KEY = 'fleet_dashboard_active_tab_v1';
    const STATUS_LEGEND_COLLAPSED_KEY = 'fleet_dashboard_legend_collapsed_v1';
    const MOTION_STATE_STORAGE_KEY = 'fleet_motion_state_v1';
    const AUTO_LOGIN_CREDENTIALS = {
      login: 'MadinaAuto',
      password: 'Gogps#2025m'
    };

    const STATUS_COLORS = {
      moving: '#00C853',
      stopped: '#FF1744',
      idle: '#FFD600',
      offline: '#FF1744'
    };

    const MOVING_STATE_CODES = new Set([0, 1]);
    const IDLE_STATE_CODES = new Set([2]);

    class ApiClient {
      constructor() {
        this.token = null;
        this.queue = Promise.resolve();
        this.queues = {
          live: Promise.resolve(),
          report: Promise.resolve()
        };
        this.lastReqByLane = {
          live: 0,
          report: 0
        };
        this.onRequestStateChange = null;
      }
      async waitDelay(lane='live') {
        const safeLane = lane === 'report' ? 'report' : 'live';
        const delta = Date.now() - (this.lastReqByLane[safeLane] || 0);
        if (delta < CONFIG.MIN_REQ_DELAY) await new Promise(r => setTimeout(r, CONFIG.MIN_REQ_DELAY - delta));
      }
      async _doFetch(endpoint, method='GET', body=null, options={}) {
        const timeoutMs = Number(options?.timeoutMs) > 0 ? Number(options.timeoutMs) : CONFIG.REQUEST_TIMEOUT_MS;
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
          const headers = { 'Content-Type': 'application/json' };
          if (this.token) headers['X-Auth'] = this.token;
          const res = await fetch(CONFIG.API_BASE_URL + endpoint, {
            method,
            headers,
            body: body ? JSON.stringify(body) : undefined,
            signal: controller.signal
          });

          let payload = null;
          const ct = res.headers.get('content-type') || '';
          if (ct.includes('application/json')) payload = await res.json();
          else payload = await res.text();

          return { res, payload };
        } finally {
          clearTimeout(timer);
        }
      }

      request(endpoint, method='GET', body=null, options={}) {
        const inferredLane = (
          endpoint.includes('/vehicles/moveStop')
          || endpoint.includes('/vehicles/fuelConsumption')
          || endpoint.includes('/vehicles/fuelInOut')
          || endpoint.includes('/vehicles/mileageAndMotohours')
        ) ? 'report' : 'live';
        const lane = options?.lane === 'report' ? 'report' : inferredLane;

        this.queues[lane] = this.queues[lane].catch(() => {}).then(async () => {
          this.onRequestStateChange?.(true, endpoint);
          await this.waitDelay(lane);
          const maxAttempts = Number(options?.maxAttempts) > 0 ? Number(options.maxAttempts) : Number(CONFIG.RETRY_ATTEMPTS || 3);
          const backoffBaseMs = Math.max(100, Number(CONFIG.RETRY_BACKOFF_BASE_MS || 1000));
          const startedAt = Date.now();
          let retriesUsed = 0;

          try {
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              this.lastReqByLane[lane] = Date.now();
              try {
                const { res, payload } = await this._doFetch(endpoint, method, body, options);
                if (res.status === 401) throw new Error('AUTH_401');

                if (!res.ok) {
                  if ((res.status === 429 || res.status === 503) && attempt < maxAttempts) {
                    retriesUsed += 1;
                    await new Promise(r => setTimeout(r, attempt * backoffBaseMs));
                    continue;
                  }
                  const detail = typeof payload === 'string'
                    ? payload.slice(0, 180)
                    : (payload?.Error || payload?.message || JSON.stringify(payload || {}).slice(0, 180));
                  throw new Error(`API_${res.status}${detail ? `: ${detail}` : ''}`);
                }

                noteRequestMetric({
                  endpoint,
                  ok: true,
                  latencyMs: Date.now() - startedAt,
                  retriesUsed,
                  statusCode: res.status,
                  errorText: ''
                });

                return payload;
              } catch (err) {
                const msg = String(err?.message || err || '');
                const retryableNetwork = msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('AbortError');
                if (attempt < maxAttempts && retryableNetwork) {
                  retriesUsed += 1;
                  await new Promise(r => setTimeout(r, attempt * backoffBaseMs));
                  continue;
                }
                const statusMatch = msg.match(/API_(\d{3})/);
                noteRequestMetric({
                  endpoint,
                  ok: false,
                  latencyMs: Date.now() - startedAt,
                  retriesUsed,
                  statusCode: statusMatch ? Number(statusMatch[1]) : null,
                  errorText: msg
                });
                throw err;
              }
            }
            noteRequestMetric({
              endpoint,
              ok: false,
              latencyMs: Date.now() - startedAt,
              retriesUsed,
              statusCode: null,
              errorText: 'Retry tugadi'
            });
            throw new Error('So‘rov bir necha urinishdan keyin ham bajarilmadi');
          } finally {
            this.onRequestStateChange?.(false, endpoint);
          }
        });
        return this.queues[lane];
      }
      login(login, password) { return this.request('/api/v3/auth/login', 'POST', { login, password }); }
      getVehicles() {
        return this.request('/api/v3/vehicles/find', 'POST', {
          vehicleId: null, name: null, imei: null, sim: null,
          deviceTypeId: null, parentId: null, unitId: null, customFields: null
        });
      }
      // NOTE: this endpoint expects raw JSON array of int IDs, not object wrapper.
      // Correct body example: [21673,21314]
      getLastData(vehicleIds) { return this.request('/api/v3/vehicles/getlastdata', 'POST', vehicleIds); }
      getMoveStop(params, options=null) { return this.request('/api/v3/vehicles/moveStop', 'POST', params, options || {}); }
      getFuelConsumption(params, options=null) { return this.request('/api/v3/vehicles/fuelConsumption', 'POST', params, options || {}); }
      getFuelInOut(params, options=null) { return this.request('/api/v3/vehicles/fuelInOut', 'POST', params, options || {}); }
      getMileageAndMotohours(params, options=null) { return this.request('/api/v3/vehicles/mileageAndMotohours', 'POST', params, options || {}); }
    }

    const app = {
      api: new ApiClient(),
      map: null,
      vehicles: [],
      lastById: {},
      lastKnownById: {},
      lastMovementAtById: {},
      activityById: {},
      diagnostics: {

        error: '',
        info: '',
        coordDiagnostics: ''
      },
      observability: {
        totalRequests: 0,
        successRequests: 0,
        failedRequests: 0,
        totalRetries: 0,
        avgLatencyMs: 0,
        lastLatencyMs: 0,
        lastError: '',
        endpointStats: {}
      },
      selectedId: null,
      markers: new Map(),
      clusterLayers: [],
      markerIcons: new Map(),
      hasAutoFittedMap: false,
      followSelected: false,
      activeTab: 'stops',
      lastStopsData: [],

      fuelRangeDays: 1,
      lastMileagePeriods: [],
      mileageRangeDays: 3,
      lastRoutesData: [],
      selectedTrailCoords: [],
      selectedTrailLine: null,
      pollId: null,
      ui: {
        inFlightRequests: 0,
        apiState: 'kutish',

        online: navigator.onLine
      },
      settings: {
        pollInterval: Math.round(CONFIG.POLL_INTERVAL / 1000),

    const LAST_KNOWN_STORAGE_KEY = 'fleet_last_known_locations_v1';

    function loadLastKnownFromStorage() {
      try {
        const raw = localStorage.getItem(LAST_KNOWN_STORAGE_KEY);

        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch (_) {
        return {};
      }
    }

      try {

      } catch (_) {}

    function loadMotionStateFromStorage() {
      try {
        const raw = localStorage.getItem(MOTION_STATE_STORAGE_KEY);
        if (!raw) return { lastMovementAtById: {}, activityById: {} };
        const parsed = JSON.parse(raw);
        return {
          lastMovementAtById: parsed?.lastMovementAtById && typeof parsed.lastMovementAtById === 'object' ? parsed.lastMovementAtById : {},
          activityById: parsed?.activityById && typeof parsed.activityById === 'object' ? parsed.activityById : {}
        };
      } catch (_) {
        return { lastMovementAtById: {}, activityById: {} };

    }

    function saveMotionStateToStorage() {

    function updateHealthStrip() {
      const textEl = document.getElementById('healthText');
      const dotEl = document.getElementById('healthDot');
      if (!textEl || !dotEl) return;

      const onlineText = app.ui.online ? 'onlayn' : 'offlayn';
      const syncText = app.ui.lastSyncAt ? formatDate(app.ui.lastSyncAt) : 'hali yo‘q';
      const loadingText = app.ui.inFlightRequests > 0 ? ` · yuklanmoqda (${app.ui.inFlightRequests})` : '';
      textEl.textContent = `Tarmoq: ${onlineText} · API: ${app.ui.apiState} · Oxirgi sinxron: ${syncText}${loadingText}`;

      if (!app.ui.online) dotEl.style.background = '#9E9E9E';
      else if (app.ui.apiState === 'xatolik') dotEl.style.background = '#FF1744';
      else if (app.ui.inFlightRequests > 0) dotEl.style.background = '#FFD600';
      else dotEl.style.background = '#00C853';
    }

    function setUiState(patch = {}) {
      app.ui = { ...app.ui, ...patch };
      updateHealthStrip();
      renderOpsDiagnostics();
    }

    function setActiveTab(tabKey) {
      app.activeTab = tabKey;
      document.querySelectorAll('.tab[data-tab]').forEach(x => x.classList.toggle('active', x.dataset.tab === tabKey));
      try { localStorage.setItem(ACTIVE_TAB_STORAGE_KEY, tabKey); } catch (_) {}
    }

    function saveSettingsToStorage() {
      try { localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(app.settings)); } catch (_) {}
    }

    function loadSettingsFromStorage() {
      try {
        const raw = localStorage.getItem(SETTINGS_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return;
        app.settings = { ...app.settings, ...parsed };
      } catch (_) {}
    }

    function applySettingsToConfig() {
      CONFIG.POLL_INTERVAL = Math.max(5000, Number(app.settings.pollInterval || 10) * 1000);
      CONFIG.OFFLINE_MIN = Math.max(1, Number(app.settings.offlineMin || 10));
      CONFIG.BATCH_SIZE = Math.max(1, Math.min(200, Number(app.settings.batchSize || 100)));
      CONFIG.RETRY_ATTEMPTS = Math.max(1, Math.min(8, Number(app.settings.retryAttempts || 3)));
      CONFIG.RETRY_BACKOFF_BASE_MS = Math.max(200, Math.min(5000, Number(app.settings.retryBackoffMs || 1000)));
    }

    function noteRequestMetric({ endpoint, ok, latencyMs, retriesUsed = 0, statusCode = null, errorText = '' }) {
      const obs = app.observability;
      obs.totalRequests += 1;
      if (ok) obs.successRequests += 1;
      else obs.failedRequests += 1;
      obs.totalRetries += Math.max(0, Number(retriesUsed) || 0);
      obs.lastLatencyMs = Number(latencyMs) || 0;
      obs.avgLatencyMs = obs.totalRequests
        ? ((obs.avgLatencyMs * (obs.totalRequests - 1) + obs.lastLatencyMs) / obs.totalRequests)
        : obs.lastLatencyMs;
      if (!ok) obs.lastError = errorText || 'So‘rov xatosi';

      if (!obs.endpointStats[endpoint]) {
        obs.endpointStats[endpoint] = { total: 0, failed: 0, retries: 0, avgLatencyMs: 0, lastStatus: null };
      }
      const ep = obs.endpointStats[endpoint];
      ep.total += 1;
      if (!ok) ep.failed += 1;
      ep.retries += Math.max(0, Number(retriesUsed) || 0);
      ep.avgLatencyMs = ((ep.avgLatencyMs * (ep.total - 1)) + obs.lastLatencyMs) / ep.total;
      ep.lastStatus = statusCode;
      renderOpsDiagnostics();
    }

    function renderOpsDiagnostics() {
      const el = document.getElementById('opsDiagPanel');
      if (!el) return;
      const obs = app.observability;
      const failRate = obs.totalRequests ? ((obs.failedRequests / obs.totalRequests) * 100).toFixed(1) : '0.0';
      el.innerHTML = `
        <strong style="color:#fff">Qo‘llab-quvvatlash diagnostikasi</strong><br>
        So‘rovlar: ${obs.totalRequests} · Xatolar: ${obs.failedRequests} (${failRate}%)<br>
        O‘rtacha kechikish: ${obs.avgLatencyMs.toFixed(0)} ms · Oxirgisi: ${obs.lastLatencyMs.toFixed(0)} ms<br>
        Retrylar: ${obs.totalRetries} · So‘nggi xato: ${escapeHtml(obs.lastError || 'yo‘q')}
      `;
    }

    function buildDiagnosticsReportText() {
      const obs = app.observability;
      const lines = [];
      lines.push('Fleet Dashboard Diagnostics Report');
      lines.push(`Generated: ${new Date().toISOString()}`);
      lines.push(`API Base: ${CONFIG.API_BASE_URL}`);
      lines.push(`Network: ${app.ui.online ? 'online' : 'offline'}`);
      lines.push(`UI API State: ${app.ui.apiState}`);
      lines.push(`Last Sync: ${app.ui.lastSyncAt || 'none'}`);
      lines.push('');
      lines.push('Request Summary:');
      lines.push(`- totalRequests: ${obs.totalRequests}`);
      lines.push(`- successRequests: ${obs.successRequests}`);
      lines.push(`- failedRequests: ${obs.failedRequests}`);
      lines.push(`- totalRetries: ${obs.totalRetries}`);
      lines.push(`- avgLatencyMs: ${obs.avgLatencyMs.toFixed(1)}`);
      lines.push(`- lastLatencyMs: ${obs.lastLatencyMs.toFixed(1)}`);
      lines.push(`- lastError: ${obs.lastError || 'none'}`);
      lines.push('');
      lines.push('Settings:');
      lines.push(`- pollIntervalSec: ${app.settings.pollInterval}`);
      lines.push(`- offlineMin: ${app.settings.offlineMin}`);
      lines.push(`- batchSize: ${app.settings.batchSize}`);
      lines.push(`- retryAttempts: ${app.settings.retryAttempts}`);
      lines.push(`- retryBackoffMs: ${app.settings.retryBackoffMs}`);
      lines.push('');
      lines.push('Endpoint Stats:');
      Object.entries(obs.endpointStats).forEach(([endpoint, st]) => {
        lines.push(`- ${endpoint}: total=${st.total}, failed=${st.failed}, retries=${st.retries}, avgLatencyMs=${st.avgLatencyMs.toFixed(1)}, lastStatus=${st.lastStatus ?? 'n/a'}`);
      });
      return lines.join('\n');
    }

    function sanitizeFileName(name, fallback = 'download.txt') {
      const safe = String(name || '').trim().replace(/[\\/:*?"<>|]+/g, '_');
      return safe || fallback;
    }

    function triggerFileDownload(filename, blob) {
      if (!blob) throw new Error('Fayl ma’lumoti topilmadi');
      const safeName = sanitizeFileName(filename);

      // Legacy fallback (old Edge/IE)
      if (navigator?.msSaveOrOpenBlob) {
        navigator.msSaveOrOpenBlob(blob, safeName);
        return;
      }

      const url = URL.createObjectURL(blob);
      try {
        const a = document.createElement('a');
        a.href = url;
        a.download = safeName;
        a.rel = 'noopener';
        document.body.appendChild(a);
        a.click();
        a.remove();
      } finally {
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }
    }

    function downloadTextFile(filename, content) {
      const text = '\uFEFF' + String(content ?? ''); // UTF-8 BOM for better encoding support
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      triggerFileDownload(filename, blob);
    }

    function restartPolling() {
      clearInterval(app.pollId);
      app.pollId = setInterval(() => refreshLastData().catch(console.error), CONFIG.POLL_INTERVAL);
    }

    function showToast(message, options = {}) {
      const container = document.getElementById('toastContainer');
      if (!container) return;
      const type = options.type || 'info';
      const timeout = Number.isFinite(Number(options.timeout)) ? Number(options.timeout) : 3500;

      const toast = document.createElement('div');
      toast.className = `toast ${type}`;

      const msg = document.createElement('div');
      msg.className = 'toast-message';
      msg.textContent = String(message || '');
      toast.appendChild(msg);

      const actions = document.createElement('div');
      actions.className = 'toast-actions';

      if (typeof options.action === 'function' && options.actionLabel) {
        const actionBtn = document.createElement('button');
        actionBtn.className = 'toast-btn';
        actionBtn.textContent = options.actionLabel;
        actionBtn.onclick = () => {
          try { options.action(); } catch (_) {}
          toast.remove();
        };
        actions.appendChild(actionBtn);
      }

      const closeBtn = document.createElement('button');
      closeBtn.className = 'toast-btn';
      closeBtn.textContent = 'Yopish';
      closeBtn.onclick = () => toast.remove();
      actions.appendChild(closeBtn);

      toast.appendChild(actions);
      container.prepend(toast);

      if (timeout > 0) {
        setTimeout(() => toast.remove(), timeout);
      }

      const maxToasts = 5;
      while (container.children.length > maxToasts) {
        container.lastElementChild?.remove();
      }
    }

    function banner(msg, timeout=3500) {
      showToast(msg, { type: 'info', timeout });
    }

    function scheduleAutoRefreshOnRoutesError() {
      const storageKey = 'fleet_routes_error_auto_reload_meta_v1';
      const now = Date.now();
      const cooldownMs = 5 * 60 * 1000;
      const maxReloadsPerCooldown = 2;

      try {
        const raw = sessionStorage.getItem(storageKey);
        const prev = raw ? JSON.parse(raw) : null;
        const prevLastAt = Number(prev?.lastAt || 0);
        const prevCount = Number(prev?.count || 0);

        const withinCooldown = (now - prevLastAt) < cooldownMs;
        const nextCount = withinCooldown ? (prevCount + 1) : 1;
        if (withinCooldown && nextCount > maxReloadsPerCooldown) return false;

        sessionStorage.setItem(storageKey, JSON.stringify({
          lastAt: now,
          count: nextCount
        }));
      } catch (_) {
        // If storage is unavailable, still proceed with a single reload attempt.
      }

      showToast('Yo‘nalishlar xatosi sabab sahifa qayta yuklanadi...', { type: 'warn', timeout: 1300 });
      setTimeout(() => {
        try { window.location.reload(); } catch (_) {}
      }, 1200);
      return true;
    }

    function arr(payload) {
      if (Array.isArray(payload)) return payload;
      if (!payload || typeof payload !== 'object') return [];
      if (payload.vehicleId || payload.VehicleId) return [payload];
      for (const k of ['items','Items','data','Data','result','Result','results','list','rows','Rows','vehicles','Vehicles','lastData']) {
        if (Array.isArray(payload[k])) return payload[k];
      }

      // Nested wrappers seen in some API gateways.
      for (const k of ['data','Data','result','Result']) {
        const nested = payload[k];
        if (nested && typeof nested === 'object') {
          for (const nk of ['items','Items','rows','Rows','list','vehicles']) {
            if (Array.isArray(nested[nk])) return nested[nk];
          }
        }
      }

      const anyArray = Object.values(payload).find(v => Array.isArray(v));
      if (anyArray) return anyArray;

      const objectValues = Object.values(payload).filter(v => v && typeof v === 'object');
      if (objectValues.length && objectValues.every(v => v.vehicleId || v.VehicleId || v.latitude || v.Latitude || v.longitude || v.Longitude)) {
        return objectValues;
      }

      const deep = findArrayDeep(payload, 0, 4);
      if (deep) return deep;
      return [];
    }

    function findArrayDeep(node, depth = 0, maxDepth = 4) {
      if (!node || depth > maxDepth) return null;
      if (Array.isArray(node)) return node;
      if (typeof node !== 'object') return null;

      for (const val of Object.values(node)) {
        if (Array.isArray(val) && val.length) return val;
      }
      for (const val of Object.values(node)) {
        if (val && typeof val === 'object') {
          const found = findArrayDeep(val, depth + 1, maxDepth);
          if (found) return found;
        }
      }
      return null;
    }

    function statusOf(d) {
      const speed = Number.isFinite(Number(d.speed)) ? Number(d.speed) : 0;
      const state = extractStateCode(d.state);
      const lastAt = d.receiveTime || d.recordTime || d.gpsTime || d.positionTime || d.lastDataTime;
      const lastMs = parseApiTimeMs(lastAt);
      const explicitLastMovementMs = parseApiTimeMs(d.lastMovementTime || d.lastMovementAt);
      const effectiveActivityMs = explicitLastMovementMs;
      const offlineByNoMovementMs = Math.max(1, Number(CONFIG.OFFLINE_BY_NO_MOVEMENT_DAYS || 3)) * 24 * 60 * 60 * 1000;
      const inactiveTooLong = Number.isFinite(effectiveActivityMs)
        ? (Date.now() - effectiveActivityMs > offlineByNoMovementMs)
        : true;
      const hasCoords = Number.isFinite(Number(d.latitude)) && Number.isFinite(Number(d.longitude));
      const isMovingByTelemetry = speed > 5 || MOVING_STATE_CODES.has(state);
      const isIdleByTelemetry = (speed > 0 && speed <= 5) || IDLE_STATE_CODES.has(state);

      // Persisted fallback points must not be treated as live online data.
      if (d.source === 'cached' && inactiveTooLong) {
        return { key: 'offline', color: STATUS_COLORS.offline };
      }

      if (inactiveTooLong) return { key: 'offline', color: STATUS_COLORS.offline };
      if (!Number.isFinite(lastMs) && !hasCoords) return { key: 'offline', color: STATUS_COLORS.offline };

      if (isMovingByTelemetry) return { key: 'moving', color: STATUS_COLORS.moving };
      if (isIdleByTelemetry) return { key: 'idle', color: STATUS_COLORS.idle };
      return { key: 'stopped', color: STATUS_COLORS.stopped };
    }

    function animateMarkerTo(marker, lat, lng, duration = 800) {
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
      const from = marker.getLatLng();
      if (!from || (from.lat === lat && from.lng === lng)) return;

      if (marker._animFrame) cancelAnimationFrame(marker._animFrame);
      const start = performance.now();
      const deltaLat = lat - from.lat;
      const deltaLng = lng - from.lng;

      const step = (now) => {
        const t = Math.min((now - start) / duration, 1);
        // Linear interpolation gives steadier, constant-speed visual motion.
        marker.setLatLng([from.lat + deltaLat * t, from.lng + deltaLng * t]);
        if (t < 1) marker._animFrame = requestAnimationFrame(step);
      };
      marker._animFrame = requestAnimationFrame(step);
    }

    function computeMarkerAnimationDuration(marker, data) {
      const speed = Number.isFinite(Number(data?.speed)) ? Number(data.speed) : 0;
      const fixTimeMs = parseApiTimeMs(
        data?.receiveTime || data?.recordTime || data?.gpsTime || data?.positionTime || data?.lastDataTime
      );
      const now = Date.now();

      const previousRenderMs = Number.isFinite(marker._lastRenderMs) ? marker._lastRenderMs : null;
      const elapsedSinceRender = previousRenderMs ? (now - previousRenderMs) : CONFIG.POLL_INTERVAL;
      let duration = Math.max(900, Math.min(Math.round(elapsedSinceRender * 0.94), CONFIG.POLL_INTERVAL + 1500));

      // If no meaningful movement telemetry, keep short transition to avoid drifting illusion.
      if (speed < 0.5) duration = 1200;

      // If backend fix time didn't change, don't stretch animation.
      if (Number.isFinite(fixTimeMs) && Number.isFinite(marker._lastFixTimeMs) && fixTimeMs === marker._lastFixTimeMs) {
        duration = 1200;
      }

      marker._lastRenderMs = now;
      if (Number.isFinite(fixTimeMs)) marker._lastFixTimeMs = fixTimeMs;
      return duration;
    }

    function isClusterModeEnabled() {
      const markerCount = [...app.markers.values()].filter(m => m.getLatLng()).length;
      return markerCount >= Number(app.settings.clusterThreshold || 50) && app.map.getZoom() <= 11;

    function syncMarkerClusterState() {
      if (!app.map) return;
      const clusterMode = isClusterModeEnabled();
      clearClusterLayers();

      if (!clusterMode) {
        for (const marker of app.markers.values()) {
          if (!app.map.hasLayer(marker)) marker.addTo(app.map);
        }
        return;
      }

      const cellSize = Math.max(40, Number(app.settings.clusterGridPx || 80));
      const zoom = app.map.getZoom();
      const groups = new Map();

      for (const marker of app.markers.values()) {
        const ll = marker.getLatLng();
        if (!ll) continue;
        if (app.map.hasLayer(marker)) app.map.removeLayer(marker);
        const pt = app.map.project(ll, zoom);
        const key = `${Math.floor(pt.x / cellSize)}:${Math.floor(pt.y / cellSize)}`;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push({ marker, ll });
      }

      for (const group of groups.values()) {
        if (group.length === 1) {
          group[0].marker.addTo(app.map);
          continue;
        }
        const lat = group.reduce((s, g) => s + g.ll.lat, 0) / group.length;
        const lng = group.reduce((s, g) => s + g.ll.lng, 0) / group.length;
        const radius = Math.min(24, 12 + Math.log2(group.length) * 3);
        const layer = L.circleMarker([lat, lng], {
          radius,
          color: '#00D4AA',
          fillColor: '#00D4AA',
          fillOpacity: 0.24,
          weight: 2
        }).addTo(app.map);
        layer.bindTooltip(`${group.length} ta transport`, { permanent: true, direction: 'center', className: 'cluster-tip' });
        layer.on('click', () => {
          app.map.setView([lat, lng], Math.min(app.map.getZoom() + 2, 18), { animate: true });
        });
        app.clusterLayers.push(layer);
      }
    }

    function haversineKm(a, b) {
      const R = 6371;
      const toRad = (x) => x * Math.PI / 180;
      const dLat = toRad(b[0] - a[0]);
      const dLon = toRad(b[1] - a[1]);
      const lat1 = toRad(a[0]);
      const lat2 = toRad(b[0]);
      const h = Math.sin(dLat/2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(h));
    }

    function routeDistanceKm(points) {
      let sum = 0;
      for (let i = 1; i < points.length; i++) {
        sum += haversineKm(points[i - 1], points[i]);
      }
      return sum;
    }
